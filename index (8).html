};

/* ---------- cost estimate sheet ---------- */

const usd = (v) => v.toLocaleString("en-US", { style: "currency", currency: "USD" });

function EstimateSheet({ items, job, drawnBy, dwgNo, estNo, svgRef, sheetNo, sheetTotal }) {
  const margin = 26;
  const tbH = 96;
  const today = new Date().toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" });
  const total = items.reduce((a, it) => a + (it.amount == null ? 0 : it.amount), 0);
  const tableX = margin + 30, tableW = SHEET_W - margin * 2 - 60;
  const colDesc = tableX + 8, colQty = tableX + tableW * 0.56, colRate = tableX + tableW * 0.74, colAmt = tableX + tableW - 8;
  const rowH = 34, headY = margin + 110;

  return (
    <svg ref={svgRef} viewBox={`0 0 ${SHEET_W} ${SHEET_H}`} xmlns="http://www.w3.org/2000/svg"
      style={{ width: "100%", height: "auto", display: "block", background: "#fff" }}>
      <rect x="0" y="0" width={SHEET_W} height={SHEET_H} fill="#ffffff" />
      <rect x={margin} y={margin} width={SHEET_W - margin * 2} height={SHEET_H - margin * 2} fill="none" stroke={LINE} strokeWidth="2.2" />
      <rect x={margin + 6} y={margin + 6} width={SHEET_W - margin * 2 - 12} height={SHEET_H - margin * 2 - 12} fill="none" stroke={LINE} strokeWidth="0.8" />

      <text x={SHEET_W / 2} y={margin + 52} textAnchor="middle" fontFamily={FONT} fontSize="22" fontWeight="700" fill={LINE} letterSpacing="0.12em">COST ESTIMATE</text>
      <text x={SHEET_W / 2} y={margin + 72} textAnchor="middle" fontFamily={FONT} fontSize="12" fontWeight="700" fill={LINE}>{`ESTIMATE NO: ${estNo || "—"}`}</text>
      <text x={SHEET_W / 2} y={margin + 88} textAnchor="middle" fontFamily={FONT} fontSize="11" fill={LINE} opacity="0.75">PRICING REFERENCE — SUBJECT TO FINAL QUOTE · FIRE GLASS QTY PER INDUSTRY COVERAGE CALC (≈90 LB/CU FT)</text>

      {/* table header */}
      <rect x={tableX} y={headY} width={tableW} height={rowH} fill="#f2f2f2" stroke={LINE} strokeWidth="1.2" />
      <text x={colDesc} y={headY + 22} fontFamily={FONT} fontSize="12" fontWeight="700" fill={LINE}>ITEM / DESCRIPTION</text>
      <text x={colQty} y={headY + 22} fontFamily={FONT} fontSize="12" fontWeight="700" fill={LINE}>QTY</text>
      <text x={colRate} y={headY + 22} fontFamily={FONT} fontSize="12" fontWeight="700" fill={LINE}>RATE</text>
      <text x={colAmt} y={headY + 22} textAnchor="end" fontFamily={FONT} fontSize="12" fontWeight="700" fill={LINE}>AMOUNT</text>

      {items.map((it, i) => {
        const y = headY + rowH * (i + 1);
        return (
          <g key={i}>
            <rect x={tableX} y={y} width={tableW} height={rowH} fill="none" stroke={LINE} strokeWidth="0.9" />
            <text x={colDesc} y={y + 15} fontFamily={FONT} fontSize="11.5" fontWeight="700" fill={LINE}>{it.item}</text>
            <text x={colDesc} y={y + 28} fontFamily={FONT} fontSize="9.5" fill={LINE} opacity="0.8">{it.desc}</text>
            <text x={colQty} y={y + 21} fontFamily={FONT} fontSize="11" fill={LINE}>{it.qty}</text>
            <text x={colRate} y={y + 21} fontFamily={FONT} fontSize="11" fill={LINE}>{it.rate}</text>
            <text x={colAmt} y={y + 21} textAnchor="end" fontFamily={FONT} fontSize="11.5" fill={LINE}>{it.amount == null ? "—" : usd(it.amount)}</text>
          </g>
        );
      })}

      {/* total */}
      {(() => {
        const y = headY + rowH * (items.length + 1) + 8;
        return (
          <g>
            <line x1={tableX + tableW * 0.6} y1={y} x2={tableX + tableW} y2={y} stroke={LINE} strokeWidth="1.4" />
            <text x={colRate} y={y + 24} fontFamily={FONT} fontSize="13" fontWeight="700" fill={LINE}>TOTAL</text>
            <text x={colAmt} y={y + 24} textAnchor="end" fontFamily={FONT} fontSize="14" fontWeight="700" fill={LINE}>{usd(total)}</text>

function Segmented({ options, value, onChange }) {
  return (
    <div style={{
      display: "flex", gap: 3, background: "#111426", width: "100%", maxWidth: "100%", boxSizing: "border-box",
      border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: 3,
      boxShadow: "inset 0 1px 3px rgba(0,0,0,0.28)",
    }}>
      {options.map((o) => {
        const on = o.value === value;
        return (
          <button key={String(o.value)} onClick={() => onChange(o.value)}
            style={{
              flexGrow: 1, flexShrink: 1, flexBasis: 0, minWidth: 0, padding: "8px 4px", border: "none", cursor: "pointer", fontSize: 13,
              fontFamily: "'IBM Plex Mono', monospace", borderRadius: 9,
              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
              background: on ? "linear-gradient(180deg, #dde93f, #b6c318)" : "transparent",
              color: on ? "#181c06" : "#b9c3cc",
              fontWeight: on ? 700 : 500,
              boxShadow: on ? "0 2px 10px rgba(205,219,44,0.35)" : "none",
            }}>{o.label}</button>
        );
      })}
    </div>
  );
}

function SizePicker({ options, value, custom, onPick, onCustom }) {
  const isCustom = !options.some((o) => o.value === value && !custom);
  return (
    <div>
      <div style={{ marginBottom: 6 }}>
        <Segmented options={options} value={custom.trim() ? "__custom__" : value} onChange={onPick} />
      </div>
      <input style={{ ...field, fontSize: 13 }} placeholder={`Custom (e.g. 1 1/4)`} value={custom}
        onChange={(e) => onCustom(e.target.value)} />
    </div>
  );
}

export default function App() {
  const svgRef = useRef(null);
  const isoRef = useRef(null);
  const bSvgRef = useRef(null);

  const [product, setProduct] = useState("dropin");
  const [job, setJob] = useState("");
  const [drawnBy, setDrawnBy] = useState("");
  const [dwgNo, setDwgNo] = useState("");

  const [panShape, setPanShape] = useState("rect"); // pans
  const [accShape, setAccShape] = useState("rect"); // standalone lid / guard // rect | square (drop-in & flat pans)
  const [len, setLen] = useState("48");

  const [dep, setDep] = useState("2");
  const [flangeV, setFlangeV] = useState(1);
  const [flangeCustom, setFlangeCustom] = useState("");
  const [inletV, setInletV] = useState(0.5);
  const [inletTouched, setInletTouched] = useState(false);
  const [inletCustom, setInletCustom] = useState("");
  const [inlets, setInlets] = useState(1);
  const [split, setSplit] = useState(false);
  const [splitTouched, setSplitTouched] = useState(false);
  const [gauge, setGauge] = useState(18);
  const [includeLid, setIncludeLid] = useState(false);
  const [includeGuard, setIncludeGuard] = useState(false);
  const [glassDepth, setGlassDepth] = useState("2");
  const [glassDepthTouched, setGlassDepthTouched] = useState(false);
  const [gLen, setGLen] = useState(""); const [gLenTouched, setGLenTouched] = useState(false);
  const [gWid, setGWid] = useState(""); const [gWidTouched, setGWidTouched] = useState(false);
  const [gDia, setGDia] = useState(""); const [gDiaTouched, setGDiaTouched] = useState(false);
  const [gThk, setGThk] = useState("3/16");
  const [gHgt, setGHgt] = useState("6");
  const [igniter, setIgniter] = useState(true);      // 2x2 ignition cut-out @ primary inlet
  const [igniterAll, setIgniterAll] = useState(false); // also at additional inlets

  const [tube, setTube] = useState("1/2");
  const [dia, setDia] = useState("24");
  const [rings, setRings] = useState(2);
  const [ringsTouched, setRingsTouched] = useState(false);

  // burner-in-pan (combo) settings — same options as standalone burners
  const [panBurner, setPanBurner] = useState("none"); // none | tburner | hburner | round
  const [hRows, setHRows] = useState(2);   // H burner tube rows (standalone)
  const [bRows, setBRows] = useState(2);   // H burner tube rows (in a pan)
  const [bLen, setBLen] = useState("36");
  const [bWid, setBWid] = useState("6");
  const [bTube, setBTube] = useState("1/2");
  const [bDia, setBDia] = useState("18");
  const [bRings, setBRings] = useState(2);
  const [bRingsTouched, setBRingsTouched] = useState(false);
  const [bInletV, setBInletV] = useState(0.5);
  const [bInletTouched, setBInletTouched] = useState(false);
  const [bInletCustom, setBInletCustom] = useState("");
  const [bInlets, setBInlets] = useState(1);
  // pan-side pass-throughs when a burner is installed:
  const [panHoleD, setPanHoleD] = useState("1");      // hole Ø for T/H burners (auto = inlet + 1/2")
  const [panHoleDTouched, setPanHoleDTouched] = useState(false);
  const [panHoles, setPanHoles] = useState(1);        // hole count (auto-syncs to burner inlets)
  const [panHolesTouched, setPanHolesTouched] = useState(false);
  const [upInD, setUpInD] = useState("1/2");          // upward male inlet Ø for ring burners
  const [upInL, setUpInL] = useState("1");            // upward male inlet length (1" std.)

  // ring-count defaults: 2 rings below 30" dia, 3 rings at 30" and above
  useEffect(() => {
    if (ringsTouched) return;
    const d = parseDim(dia);
    if (!isNaN(d) && d > 0) setRings(d >= 30 ? 3 : 2);
  }, [dia, ringsTouched]);
  useEffect(() => {
    if (bRingsTouched) return;
    const d = parseDim(bDia);
    if (!isNaN(d) && d > 0) setBRings(d >= 30 ? 3 : 2);
  }, [bDia, bRingsTouched]);

  // inlet size auto-default: T burners over 96" and H burners over 48" get 3/4" NPT
  useEffect(() => {
    if (inletTouched || inletCustom.trim()) return;
    const L = parseDim(len);
    if (isNaN(L)) return;
    if (product === "tburner") setInletV(L > 96 ? 0.75 : 0.5);
    else if (product === "hburner") setInletV(L > 48 ? 0.75 : 0.5);
  }, [product, len, inletTouched, inletCustom]);
  useEffect(() => {
    if (inletTouched || inletCustom.trim()) return;
    if (product !== "round") return;
    const d = parseDim(dia);
    if (!isNaN(d)) setInletV(d > 30 ? 0.75 : 0.5);
  }, [product, dia, inletTouched, inletCustom]);
  useEffect(() => {
    if (bInletTouched || bInletCustom.trim()) return;
    const L = parseDim(bLen);
    if (isNaN(L)) return;
    if (panBurner === "tburner") setBInletV(L > 96 ? 0.75 : 0.5);
    else if (panBurner === "hburner") setBInletV(L > 48 ? 0.75 : 0.5);
  }, [panBurner, bLen, bInletTouched, bInletCustom]);
  useEffect(() => {
    if (bInletTouched || bInletCustom.trim()) return;
    if (panBurner !== "round") return;
    const d = parseDim(bDia);
    if (!isNaN(d)) setBInletV(d > 30 ? 0.75 : 0.5);
  }, [panBurner, bDia, bInletTouched, bInletCustom]);

  // pan hole count follows the burner's inlet count until manually overridden
  useEffect(() => {
    if (!panHolesTouched) setPanHoles(bInlets);
  }, [bInlets, panHolesTouched]);

  // pan hole Ø auto-sets to burner inlet + 1/2" for standard inlet sizes,
  // until a custom hole size is typed
  useEffect(() => {
    if (panHoleDTouched) return;
    if (bInletCustom.trim()) return; // custom inlet: leave hole as-is
    const map = { 0.5: "1", 0.75: "1 1/4", 1: "1 1/2" };
    if (map[bInletV] !== undefined) setPanHoleD(map[bInletV]);
  }, [bInletV, bInletCustom, panHoleDTouched]);

  // auto-split: pans over 100" long or 44" wide (I.D.) split in half automatically
  useEffect(() => {
    if (splitTouched) return;
    const isRound = product === "roundflat" || product === "rounddropin";
    const L = isRound ? parseDim(dia) : parseDim(len);
    const W = isRound ? parseDim(dia) : (panShape === "square" ? parseDim(len) : parseDim(wid));
    if (isNaN(L) || isNaN(W)) return;
    setSplit(L > 100 || W > 44);
  }, [product, panShape, len, wid, dia, splitTouched]);

  // fire glass fill depth defaults to the pan depth (drop-ins) or 2" (flat pans)
  useEffect(() => {
    if (glassDepthTouched) return;
    if (product === "dropin" || product === "rounddropin") {
      if (!isNaN(parseDim(dep))) setGlassDepth(dep);
    } else setGlassDepth("2");
  }, [product, dep, glassDepthTouched]);

  // flame guard auto-sizing: pan O.A. + 4" each direction (until manually overridden)
  useEffect(() => {
    if (!includeGuard) return;
    const numStr = (v) => (Math.round(v * 16) / 16).toString();
    const fl = flangeCustom.trim() ? parseDim(flangeCustom) : flangeV;
    if (product === "roundflat" || product === "rounddropin") {
      // round pans get a SQUARE guard around the pan (no round guards)
      const d = parseDim(dia);
      const oa = product === "rounddropin" ? d + 2 * fl : d;
      if (!isNaN(oa) && oa > 0) {
        if (!gLenTouched) setGLen(numStr(oa + 4));
        if (!gWidTouched) setGWid(numStr(oa + 4));
      }
      return;
    }
    const sq = panShape === "square";
    const baseL = parseDim(len);
    const baseW = sq ? parseDim(len) : parseDim(wid);
    const pl = product === "dropin" ? baseL + 2 * fl : baseL;
    const pwd = product === "dropin" ? baseW + 2 * fl : baseW;
    if (!gLenTouched && !isNaN(pl) && pl > 0) setGLen(numStr(pl + 4));
    if (!gWidTouched && !isNaN(pwd) && pwd > 0) setGWid(numStr(pwd + 4));
  }, [includeGuard, product, panShape, len, wid, dia, flangeV, flangeCustom, gLenTouched, gWidTouched, gDiaTouched]);

  const inletD = inletCustom.trim() ? parseDim(inletCustom) : inletV;
  const inletLabel = inletCustom.trim() ? fmtIn(inletD) : fmtIn(inletV);
  const flange = flangeCustom.trim() ? parseDim(flangeCustom) : flangeV;
  const bInletD = bInletCustom.trim() ? parseDim(bInletCustom) : bInletV;
  const bInletLabel = bInletCustom.trim() ? fmtIn(bInletD) : fmtIn(bInletV);

  const isPan = product === "dropin" || product === "rounddropin" || product === "flat" || product === "roundflat";
  const comboActive = isPan && panBurner !== "none";

  const burner = useMemo(() => comboActive ? {
    type: panBurner,
    bL: parseDim(bLen), bW: parseDim(bWid), tube: parseDim(bTube),
    bDia: parseDim(bDia), rings: Math.max(1, bRings),
    inletD: bInletD, inletLabel: bInletLabel,
    inlets: panBurner === "round" ? 1 : bInlets,
    rows: bRows,
  } : null, [comboActive, panBurner, bLen, bWid, bTube, bDia, bRings, bInletD, bInletLabel, bInlets, bRows]);

  const isSquarePan = (product === "dropin" || product === "flat") && panShape === "square";
  const params = useMemo(() => ({
    L: parseDim(len), W: isSquarePan ? parseDim(len) : parseDim(wid), D: parseDim(dep),
    isSquare: isSquarePan,
    flange, inletD, inletLabel, inlets, split,
    tube: parseDim(tube), dia: parseDim(dia), rings: Math.max(1, rings),
    gauge, igniter, igniterAll, burner,
    holeD: parseDim(panHoleD), holes: Math.max(1, panHoles),
    glassFill: parseDim(glassDepth),
    upD: parseDim(upInD), upL: parseDim(upInL), rows: hRows,
  }), [len, wid, dep, flange, inletD, inletLabel, inlets, split, tube, dia, rings, gauge, igniter, igniterAll, burner, panHoleD, panHoles, upInD, upInL, isSquarePan, glassDepth, hRows]);

  const isAccessoryOnly = product === "lidonly" || product === "guardonly";
  const accRound = product === "lidonly" && accShape === "round"; // guards are never round
  const isRoundShape = product === "round" || product === "roundflat" || product === "rounddropin" || accRound;

  // standalone lid / guard products render through the same sheet components
  const accLidParams = useMemo(() => {
    if (product !== "lidonly") return null;
    if (accShape === "round") {
      const d = parseDim(dia);
      if (isNaN(d) || d <= 0) return null;
      return { dia: d, handles: Math.max(1, Math.ceil(d / 38)), gauge, split: false, burner: null, standalone: true };
    }
    const L = parseDim(len), W = parseDim(wid);
    if (isNaN(L) || isNaN(W) || L <= 0 || W <= 0) return null;
    return { L, W, handles: Math.max(1, Math.ceil(L / 38)), gauge, split: false, burner: null, standalone: true };
  }, [product, accShape, len, wid, dia, gauge]);

  const accGuardParams = useMemo(() => {
    if (product !== "guardonly") return null;
    const t = 3 / 16, H = parseDim(gHgt); // glass is always 3/16" thk.
    if (isNaN(t) || isNaN(H) || t <= 0 || H <= 0) return null;
    const L = parseDim(len), W = parseDim(wid);
    if (isNaN(L) || isNaN(W) || L <= 0 || W <= 0) return null;
    return { L, W, t, H, split: false, burner: null, standalone: true };
  }, [product, len, wid, gThk, gHgt]);

  const mainProduct = product === "lidonly" ? (accRound ? "lidround" : "lid")
    : product === "guardonly" ? (accRound ? "guardround" : "guard")
    : product;
  const mainParams = product === "lidonly" ? accLidParams : product === "guardonly" ? accGuardParams : params;



  const needs = {
    dropin: [params.L, params.W, params.D, params.flange, params.inletD],
    rounddropin: [params.dia, params.D, params.flange, params.inletD],
    flat: [params.L, params.W, params.inletD],
    roundflat: [params.dia, params.inletD],
    tburner: [params.L, params.tube, params.inletD],
    hburner: [params.L, params.W, params.tube, params.inletD],
    round: [params.dia, params.tube, params.inletD],
    lidonly: accRound ? [parseDim(dia)] : [parseDim(len), parseDim(wid)],
    guardonly: [parseDim(len), parseDim(wid), parseDim(gHgt)],
  }[product].slice();
  if (burner) {
    needs.push(burner.inletD);
    if (burner.type === "round") needs.push(params.upD, params.upL);
    else needs.push(params.holeD);
    if (burner.type === "tburner") needs.push(burner.bL, burner.tube);
    if (burner.type === "hburner") needs.push(burner.bL, burner.bW, burner.tube);
    if (burner.type === "round") needs.push(burner.bDia, burner.tube);
  }
  // burner must fit inside the pan
  let fits = true;
  if (burner) {
    const panL = (product === "roundflat" || product === "rounddropin") ? params.dia : params.L;
    const panW = (product === "roundflat" || product === "rounddropin") ? params.dia : params.W;
    if (burner.type === "tburner") fits = burner.bL <= panL;
    if (burner.type === "hburner") fits = burner.bL <= panL && burner.bW <= panW;
    if (burner.type === "round") fits = burner.bDia <= Math.min(panL, panW);
  }
  const valid = needs.every((v) => !isNaN(v) && v > 0) && fits && !(isAccessoryOnly && !mainParams);



  // When an assembly is active, also generate standalone sheets for the burner itself
  const burnerProduct = burner ? burner.type : null;
  const burnerParams = useMemo(() => {
    if (!burner) return null;
    const base = { inletD: burner.inletD, inletLabel: burner.inletLabel, inlets: burner.inlets, split: false, burner: null };
    if (burner.type === "tburner") return { ...base, L: burner.bL, tube: burner.tube };
    if (burner.type === "hburner") return { ...base, L: burner.bL, W: burner.bW, tube: burner.tube, rows: burner.rows };
    return { ...base, dia: burner.bDia, rings: burner.rings, tube: burner.tube, inlets: 1 };
  }, [burner]);
  // lid auto-sized from the pan: 1" larger per side than pan O.A., 1.5" high,
  // one handle per 38" of lid length
  const lidActive = isPan && includeLid;
  const lidProduct = (product === "roundflat" || product === "rounddropin") ? "lidround" : "lid";
  const lidParams = useMemo(() => {
    if (!lidActive) return null;
    if (product === "roundflat" || product === "rounddropin") {
      const base = product === "rounddropin" ? params.dia + 2 * params.flange : params.dia;
      const d = base + 2;
      if (isNaN(d) || d <= 2) return null;
      return { dia: d, handles: Math.max(1, Math.ceil(d / 38)), gauge, panDia: base, split: false, burner: null };
    }
    const panL = product === "dropin" ? params.L + 2 * params.flange : params.L;
    const panW = product === "dropin" ? params.W + 2 * params.flange : params.W;
    if (isNaN(panL) || isNaN(panW)) return null;
    const lidL = panL + 2, lidW = panW + 2;
    return { L: lidL, W: lidW, handles: Math.max(1, Math.ceil(lidL / 38)), gauge, panL, panW, split: false, burner: null };
  }, [lidActive, product, params, gauge]);

  const guardActive = isPan && includeGuard && product !== "roundflat" && product !== "rounddropin"; // no guards on round pans
  const guardProduct = "guard"; // guards are always rectangular / square
  const guardParams = useMemo(() => {
    if (!guardActive) return null;
    const t = 3 / 16, H = parseDim(gHgt); // glass is always 3/16" thk.
    const gl = parseDim(gLen), gw = parseDim(gWid);
    if ([gl, gw, t, H].some((v) => isNaN(v) || v <= 0)) return null;
    return { L: gl, W: gw, t, H, split: false, burner: null };
  }, [guardActive, product, gLen, gWid, gDia, gThk, gHgt]);

  // cost estimate line items (flame guards: $4/lin. in. up to 120", $3.85/lin. in. over)
  // media selection state
  const [pricingTier, setPricingTier] = useState("dealer");
  const [mediaType, setMediaType] = useState("fireGlass");
  const [mediaCategory, setMediaCategory] = useState("");
  const [selectedMedia, setSelectedMedia] = useState(null);
  const [mediaQuantity, setMediaQuantity] = useState(1);
  const [mediaItems, setMediaItems] = useState([]);

  // helper to get price by tier
  const getMediaPrice = (product) => {
    if (!product) return 0;
    const tier = pricingTier === "map" && product.map ? product.map : product[pricingTier] || 0;
    return tier || 0;
  };

  // calculate quantity needed based on pan volume and media weight
  const calculateMediaQuantity = (product) => {
    if (!product || !product.weight) return 1;
    
    const panLenInches = parseDim(len) || 0;
    const panWidInches = parseDim(wid) || 0;
    const fillDepthInches = parseDim(glassDepth) || 0;
    
    if (!panLenInches || !panWidInches || !fillDepthInches) return 1;
    
    // Calculate volume in cubic inches
    const volumeCubicInches = panLenInches * panWidInches * fillDepthInches;
    // Convert to cubic feet
    const volumeCubicFeet = volumeCubicInches / 1728;
    
    // Get density for media type (lbs per cubic foot)
    const densities = {
      fireGlass: 115,
      lavaRock: 90,
      tumbledLava: 120
    };
    const density = densities[mediaType] || 115;
    
    // Calculate total weight needed
    const totalWeightNeeded = volumeCubicFeet * density;
    // Divide by bag weight and round up
    const quantityNeeded = Math.ceil(totalWeightNeeded / product.weight);
    
    return Math.max(1, quantityNeeded);
  };

  // recalculate media quantity when pan dimensions change
  useEffect(() => {
    if (selectedMedia) {
      setMediaQuantity(calculateMediaQuantity(selectedMedia));
    }
  }, [len, wid, glassDepth, selectedMedia, mediaType, calculateMediaQuantity]);

  // add media to estimate
  const addMediaToEstimate = () => {
    if (!selectedMedia) return;
    const price = getMediaPrice(selectedMedia);
    const item = {
      id: Date.now(),
      type: "media",
      sku: selectedMedia.sku,
      description: selectedMedia.name,
      qty: parseInt(mediaQuantity) || 1,
      unitPrice: price,
      total: price * (parseInt(mediaQuantity) || 1),
    };
    setMediaItems([...mediaItems, item]);
    setSelectedMedia(null);
    setMediaQuantity(1);

    const dt = Date.now() - touch.current.t;

  const svgToPng = (svgEl, scale = 2.2, quality = 0) => new Promise((resolve, reject) => {
    try {
      const xml = new XMLSerializer().serializeToString(svgEl);
      const img = new Image();
      img.onload = () => {
        try {
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(SHEET_W * scale);
          canvas.height = Math.round(SHEET_H * scale);
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          // quality > 0 → JPEG (much smaller for e-mailable files); else lossless PNG
          resolve(quality > 0 ? canvas.toDataURL("image/jpeg", quality) : canvas.toDataURL("image/png"));
        } catch (e) { reject(e); }
      };
      img.onerror = () => reject(new Error("SVG image load failed"));
      img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(xml);
    } catch (e) { reject(e); }
  });

    const { jsPDF } = await import("jspdf");
    const doc = new jsPDF({ orientation: "landscape", unit: "in", format: "letter", compress: true });
    const pl = pagePlace();
    for (let i = 0; i < pages.length; i++) {
      const img = await svgToPng(pages[i], scale, quality);
      if (i > 0) doc.addPage("letter", "landscape");
      doc.addImage(img, quality > 0 ? "JPEG" : "PNG", pl.x, pl.y, pl.w, pl.h, undefined, "FAST");
    }
    return doc;
  };

                    <input style={field} value={gHgt} onChange={(e) => setGHgt(e.target.value)} placeholder="6" />
                  </div>
                </div>
              )}
            </div>
          )}

          {isPan && (
            <div style={{ ...row }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <input id="ign" type="checkbox" checked={igniter} onChange={(e) => setIgniter(e.target.checked)}
                  style={{ accentColor: "#cddb2c", width: 16, height: 16 }} />
                <label htmlFor="ign" style={{ fontSize: 13, color: "#c4ccd4", cursor: "pointer" }}>
                  2" × 2" ignition system cut-out (auto @ center inlet)
                </label>
              </div>
              {igniter && (comboActive ? (panBurner !== "round" && panHoles > 1) : inlets > 1) && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: 24 }}>
                  <input id="ignAll" type="checkbox" checked={igniterAll} onChange={(e) => setIgniterAll(e.target.checked)}
                    style={{ accentColor: "#cddb2c", width: 16, height: 16 }} />
                  <label htmlFor="ignAll" style={{ fontSize: 13, color: "#c4ccd4", cursor: "pointer" }}>
                    Also cut at additional inlets
                  </label>
                </div>
              )}
            </div>
          )}

          {isPan && (
            <div style={{ border: "1px solid rgba(255,255,255,0.06)", borderRadius: 13, background: "rgba(255,255,255,0.02)", padding: "14px 14px 6px", marginBottom: 16 }}>
              <div style={row}>
                <span style={lab}>Burner in pan (assembly)</span>
                <select style={field} value={panBurner} onChange={(e) => setPanBurner(e.target.value)}>
                  <option value="none">None — pan only</option>
                  <option value="tburner">Linear T burner</option>
                  <option value="hburner">H burner</option>
                  <option value="round">Round ring burner</option>
                </select>
              </div>
              {(panBurner === "tburner" || panBurner === "hburner") && (
                <>
                  <div style={{ display: "flex", gap: 10, ...row }}>
                    <div style={{ flex: 1 }}>
                      <span style={lab}>Burner length</span>
                      <input style={field} value={bLen} onChange={(e) => setBLen(e.target.value)} placeholder="36" />
                    </div>
                    {panBurner === "hburner" && (
                      <div style={{ flex: 1 }}>
                        <span style={lab}>Burner width</span>
                        <input style={field} value={bWid} onChange={(e) => setBWid(e.target.value)} placeholder="6" />
                      </div>
                    )}
                  </div>
                  {panBurner === "hburner" && (
                    <div style={row}>
                      <span style={lab}>Burner tube rows</span>
                      <Segmented options={[2, 3, 4].map((n) => ({ value: n, label: String(n) }))}
                        value={bRows} onChange={setBRows} />
                    </div>
                  )}
                  <div style={row}>
                    <span style={lab}>Tube diameter</span>
                    <input style={field} value={bTube} onChange={(e) => setBTube(e.target.value)} placeholder="1/2" />
                  </div>
                </>
              )}
              {panBurner === "round" && (
                <>
                  <div style={row}>
                    <span style={lab}>Burner diameter</span>
                    <input style={field} value={bDia} onChange={(e) => setBDia(e.target.value)} placeholder="18" />
                  </div>
                  <div style={row}>
                    <span style={lab}>Tube diameter</span>
                    <input style={field} value={bTube} onChange={(e) => setBTube(e.target.value)} placeholder="1/2" />
                  </div>
                  <div style={row}>
                    <span style={lab}>Concentric rings (equally spaced)</span>
                    <input style={field} type="number" min="1" max="12" value={bRings}
                      onChange={(e) => { setBRingsTouched(true); setBRings(parseInt(e.target.value) || 1); }} />
                  </div>
                </>
              )}
              {panBurner !== "none" && (
                <div style={row}>
                  <span style={lab}>{panBurner === "round" ? "Center inlet size (NPT)" : "Gas inlet size (NPT)"}</span>
                  <SizePicker options={INLET_SIZES} value={bInletV} custom={bInletCustom}
                    onPick={(v) => { setBInletTouched(true); setBInletV(v); setBInletCustom(""); }} onCustom={(v) => { setBInletTouched(true); setBInletCustom(v); }} />
                </div>
              )}
              {(panBurner === "tburner" || panBurner === "hburner") && (
                <div style={row}>
                  <span style={lab}>Number of inlets{panBurner === "hburner" ? " (adds crossbars)" : ""}</span>
                  <Segmented options={[1, 2, 3, 4].map((n) => ({ value: n, label: String(n) }))}
                    value={bInlets} onChange={setBInlets} />
                </div>
              )}
              {(panBurner === "tburner" || panBurner === "hburner") && (
                <>
                  <div style={{ display: "flex", gap: 10, ...row }}>
                    <div style={{ flex: 1 }}>
                      <span style={lab}>{`Pan hole Ø — auto = inlet + 1/2", or custom`}</span>
                      <input style={field} value={panHoleD}
                        onChange={(e) => { setPanHoleDTouched(true); setPanHoleD(e.target.value); }} placeholder="1" />
                    </div>
                  </div>
                  <div style={row}>
                    <span style={lab}>Pan holes (auto = burner inlets)</span>
                    <Segmented options={[1, 2, 3, 4].map((n) => ({ value: n, label: String(n) }))}
                      value={panHoles} onChange={(n) => { setPanHolesTouched(true); setPanHoles(n); }} />
                  </div>
                </>
              )}
              {panBurner === "round" && (
                <div style={{ display: "flex", gap: 10, ...row }}>
                  <div style={{ flex: 1 }}>
                    <span style={lab}>Pan inlet Ø (male, up)</span>
                    <input style={field} value={upInD} onChange={(e) => setUpInD(e.target.value)} placeholder="1/2" />
                  </div>
                  <div style={{ flex: 1 }}>
                    <span style={lab}>Pan inlet length</span>
                    <input style={field} value={upInL} onChange={(e) => setUpInL(e.target.value)} placeholder="1" />
                  </div>
                </div>
              )}
              {comboActive && !fits && (
                <div style={{ fontSize: 12, color: "#e07a5f", marginBottom: 10, lineHeight: 1.4 }}>
                  Burner is larger than the pan — reduce the burner size or enlarge the pan.
                </div>
              )}
              {comboActive && panBurner === "round" && (
                <div style={{ fontSize: 11, color: "#6b7580", marginBottom: 10, lineHeight: 1.4 }}>
                  Ring burner uses (1) centered inlet thru the pan bottom.
                </div>
              )}
            </div>
          )}

          {/* ========== MEDIA SELECTION SECTION ========== */}
          <div style={{
            marginBottom: 18, paddingTop: 16, paddingBottom: 16,
            borderTop: "1px solid rgba(255,255,255,0.06)",
            borderBottom: "1px solid rgba(255,255,255,0.06)",
          }}>
            <div style={{ ...lab, marginBottom: 12 }}>Fill Media & Pricing</div>
            
            {/* pricing tier selection */}
            <div style={row}>
              <span style={lab}>Pricing tier</span>
              <Segmented options={[
                { value: "msrp", label: "MSRP" },
                { value: "map", label: "MAP" },
                { value: "dealer", label: "Dealer" },
                { value: "premier", label: "Premier" }
              ]} value={pricingTier} onChange={setPricingTier} />
            </div>

            {/* media type and category */}
            <div style={{ display: "flex", gap: 10, ...row }}>
              <div style={{ flex: 1 }}>
                <span style={lab}>Media type</span>
                <select style={field} value={mediaType} onChange={(e) => {
                  setMediaType(e.target.value);
                  setMediaCategory("");
                  setSelectedMedia(null);
                }}>
                  <option value="fireGlass">Fire Glass</option>
                  <option value="lavaRock">Lava Rock</option>
                  <option value="tumbledLava">Lite Stones & Balls</option>
                </select>
              </div>
              <div style={{ flex: 1 }}>
                <span style={lab}>Category</span>
                <select style={field} value={mediaCategory} onChange={(e) => {
                  setMediaCategory(e.target.value);
                  setSelectedMedia(null);
                }}>
                  <option value="">All subcategories</option>
                  {Object.keys(MEDIA_DATA[mediaType].categories).map(cat => (
                    <option key={cat} value={cat}>{cat}</option>
                  ))}
                </select>
              </div>
            </div>

            {/* SKU selection */}
            {mediaCategory && (
              <div style={row}>
                <span style={lab}>Select SKU</span>
                <select style={field} 
                  value={selectedMedia ? selectedMedia.sku : ""}
                  onChange={(e) => {
                    if (!e.target.value) {
                      setSelectedMedia(null);
                    } else {
                      const product = getAvailableProducts().find(p => p.sku === e.target.value);
                      if (product) {
                        setSelectedMedia(product);
                        setMediaQuantity(calculateMediaQuantity(product));
                      }
                    }
                  }}>
                  <option value="">Choose a product...</option>
                  {getAvailableProducts().map(p => (
                    <option key={p.sku} value={p.sku}>
                      {p.name} — {p.sku} ({usd(getMediaPrice(p))})
                    </option>
                  ))}
                </select>
              </div>
            )}

            {!mediaCategory && (
              <div style={{ ...row, padding: 12, background: "rgba(255,255,255,0.02)", borderRadius: 8, fontSize: 12, color: "#93a0ac" }}>
                Select a category above to view available SKUs
              </div>
            )}

            {/* selected product display and quantity */}
            {selectedMedia && (
              <div style={{
                background: "rgba(221, 233, 63, 0.08)", borderRadius: 8, padding: 12,
                border: "1px solid rgba(221, 233, 63, 0.2)", marginBottom: 12
              }}>
                <div style={{ fontSize: 12, color: "#e8edf1", marginBottom: 10 }}>
                  <div style={{ fontWeight: 700 }}>{selectedMedia.name}</div>
                  <div style={{ fontSize: 11, color: "#93a0ac", marginTop: 4 }}>
                    SKU: {selectedMedia.sku}
                  </div>
                  <div style={{ fontSize: 11, color: "#93a0ac", marginTop: 2 }}>
                    Unit Price ({pricingTier.toUpperCase()}): <span style={{ fontWeight: 600 }}>{usd(getMediaPrice(selectedMedia))}</span>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
                  <div style={{ flex: 1 }}>
                    <span style={lab}>Quantity (auto-calculated)</span>
                    <input style={field} 
                      type="number" 
                      min="1" 
                      value={mediaQuantity}
                      onChange={(e) => setMediaQuantity(Math.max(1, parseInt(e.target.value) || 1))} />
                    <div style={{ fontSize: 9, color: "#7d879a", marginTop: 4 }}>
                      Based on {parseDim(len)}" × {parseDim(wid)}" pan, {parseDim(glassDepth)}" fill depth
                    </div>
                  </div>
                  <div style={{ flex: 1, fontSize: 11 }}>
                    <div style={lab}>Line total</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#dde93f" }}>
                      {usd(getMediaPrice(selectedMedia) * mediaQuantity)}
                    </div>
                  </div>
                  <button onClick={addMediaToEstimate} style={{
                    padding: "10px 16px", borderRadius: 8, border: "none", cursor: "pointer",
                    background: "linear-gradient(180deg, #dde93f, #b6c318)", color: "#181c06",
                    fontWeight: 700, fontSize: 12,
                  }}>+ Add</button>
                </div>
              </div>
            )}

            {/* media items list */}
            {mediaItems.length > 0 && (
              <div style={{ marginTop: 12 }}>
                <div style={{ ...lab, marginBottom: 8 }}>Added items ({mediaItems.length})</div>
                {mediaItems.map(item => (
                  <div key={item.id} style={{
                    background: "rgba(255,255,255,0.03)", borderRadius: 6, padding: 10,
                    marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center",
                    fontSize: 11
                  }}>
                    <div>
                      <div style={{ color: "#e8edf1", fontWeight: 600 }}>{item.description}</div>
                      <div style={{ color: "#93a0ac", fontSize: 10, marginTop: 3 }}>{item.sku} • Qty: {item.qty} × {usd(item.unitPrice)}</div>
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <div style={{ fontWeight: 700, color: "#dde93f", minWidth: 70, textAlign: "right" }}>
                        {usd(item.total)}
                      </div>
                      <button onClick={() => removeMediaItem(item.id)} style={{
                        padding: "4px 8px", borderRadius: 4, border: "none", cursor: "pointer",
                        background: "rgba(224, 122, 95, 0.2)", color: "#e07a5f", fontSize: 11, fontWeight: 600
                      }}>Remove</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setExportMenu((v) => !v)} disabled={!valid || exporting}
              style={{
                flex: 1, padding: "12px 0", borderRadius: 9, border: "none", cursor: valid && !exporting ? "pointer" : "not-allowed",
                background: valid ? "linear-gradient(180deg, #dde93f, #b6c318)" : "#262b45",
                color: valid ? "#181c06" : "#6b7580",
                boxShadow: valid ? "0 4px 14px rgba(205,219,44,0.28), inset 0 1px 0 rgba(255,255,255,0.25)" : "none",
                fontWeight: 700, fontSize: 14, letterSpacing: "0.02em",
              }}>{exporting ? "Generating…" : "Export PDF"}</button>
            <button onClick={downloadSVG} disabled={!valid}
              style={{
                flex: 1, padding: "12px 0", borderRadius: 9, cursor: valid ? "pointer" : "not-allowed",
                border: "1px solid #3d4752", background: "rgba(255,255,255,0.03)",
                color: valid ? "#e8edf1" : "#6b7580", fontWeight: 600, fontSize: 14, letterSpacing: "0.02em",
              }}>Download SVG</button>
          </div>
          {exportMenu && !exporting && (
            <div style={{
              marginTop: 10, padding: 10, borderRadius: 13,
              border: "1px solid rgba(255,255,255,0.08)", background: "rgba(255,255,255,0.03)",
            }}>
              <div style={{ ...lab, marginBottom: 8 }}>Send drawings as</div>
              <button onClick={() => printPDF("download")}
                style={{
                  width: "100%", padding: "11px 0", marginBottom: 7, cursor: "pointer",
                  border: "none", borderRadius: 10,
                  background: "linear-gradient(180deg, #dde93f, #b6c318)", color: "#181c06",
                  fontWeight: 700, fontSize: 13.5,
                }}>⤓  Download PDF</button>
              <button onClick={() => printPDF("email")}
                style={{
                  width: "100%", padding: "11px 0", cursor: "pointer",
                  border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10,
                  background: "rgba(255,255,255,0.04)", color: "#e8edf1",
                  fontWeight: 600, fontSize: 13.5,
                }}>✉  Email PDF</button>
              <div style={{ fontSize: 10.5, color: "#7d879a", marginTop: 8, lineHeight: 1.5 }}>
                Email opens your device's share sheet (Mail, Gmail, Outlook…) with the PDF attached. On desktop browsers that can't attach directly, the PDF downloads and a pre-filled draft opens.
              </div>
            </div>
          )}
          <div style={{ fontSize: 11, color: "#6b7580", marginTop: 8, lineHeight: 1.5 }}>
            PDFs are compressed to stay under the 24 MB e-mail limit{lastSize ? ` — last export ${lastSize} MB` : ""}. SVG downloads every sheet as an editable vector file.
          </div>
        </div>

        {/* ---------- preview ---------- */}
        <div style={{
          flex: 1, minWidth: 0, maxWidth: "100%", boxSizing: "border-box",
          padding: isMobile ? 10 : 28, overflowY: "auto", overflowX: "hidden",
          display: isMobile && mobileTab !== "drawings" ? "none" : "flex",
          alignItems: "flex-start", justifyContent: "center",
        }}>
          {valid ? (
            <div id="print-area" style={{ width: "100%", maxWidth: 1180 }}>
              <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden", marginBottom: 26 }}>
                <Sheet product={mainProduct} params={mainParams} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo} svgRef={svgRef}
                  sheetNo={1} sheetTotal={sheetTotal} />
              </div>
              <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden", marginBottom: burner ? 26 : 0 }}>
                <IsoSheet product={mainProduct} params={mainParams} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo} svgRef={isoRef}
                  title={sheetTitle(mainProduct, mainParams)} sheetNo={2} sheetTotal={sheetTotal} />
              </div>
              {burner && burnerParams && (
                <>
                  <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden", marginBottom: 26 }}>
                    <Sheet product={burnerProduct} params={burnerParams} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo}
                      svgRef={bSvgRef} sheetNo={3} sheetTotal={sheetTotal} />
                  </div>
                  <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden", marginBottom: lidParams ? 26 : 0 }}>
                    <IsoSheet product={burnerProduct} params={burnerParams} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo}
                      svgRef={bIsoRef} title={sheetTitle(burnerProduct, burnerParams)} sheetNo={4} sheetTotal={sheetTotal} />
                  </div>
                </>
              )}
              {lidParams && (
                <>
                  <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden", marginBottom: 26 }}>
                    <Sheet product={lidProduct} params={lidParams} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo}
                      svgRef={lidSvgRef} sheetNo={lidSheetNo} sheetTotal={sheetTotal} />
                  </div>
                  <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden", marginBottom: guardParams ? 26 : 0 }}>
                    <IsoSheet product={lidProduct} params={lidParams} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo}
                      svgRef={lidIsoRef} title={sheetTitle(lidProduct, lidParams)} sheetNo={lidSheetNo + 1} sheetTotal={sheetTotal} />
                  </div>
                </>
              )}
              {guardParams && (
                <>
                  <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden", marginBottom: 26 }}>
                    <Sheet product={guardProduct} params={guardParams} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo}
                      svgRef={guardSvgRef} sheetNo={guardSheetNo} sheetTotal={sheetTotal} />
                  </div>
                  <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden", marginBottom: estActive ? 26 : 0 }}>
                    <IsoSheet product={guardProduct} params={guardParams} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo}
                      svgRef={guardIsoRef} title={sheetTitle(guardProduct, guardParams)} sheetNo={guardSheetNo + 1} sheetTotal={sheetTotal} />
                  </div>
                </>
              )}
              {estActive && (
                <div className="sheet-page" style={{ boxShadow: "0 12px 40px rgba(0,0,0,0.5)", borderRadius: 3, overflow: "hidden" }}>
                  <EstimateSheet items={[
                    ...estimateItems,
                    ...mediaItems.map(m => ({
                      item: "Media",
                      desc: `${m.description} (${pricingTier.toUpperCase()})`,
                      qty: m.qty,
                      rate: usd(m.unitPrice),
                      amount: m.total
                    }))
                  ]} job={job} drawnBy={drawnBy} dwgNo={dwgNo} estNo={estNo}
                    svgRef={estSvgRef} sheetNo={sheetTotal} sheetTotal={sheetTotal} />
                </div>
              )}
            </div>
          ) : (
            <div style={{ marginTop: 120, textAlign: "center", color: "#6b7580", fontFamily: "'IBM Plex Mono', monospace", fontSize: 14 }}>
              Enter valid dimensions to generate the drawing.<br />
              <span style={{ fontSize: 12 }}>Accepts decimals (48.5) or fractions (48 1/2).</span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
