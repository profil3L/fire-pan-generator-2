/* ---------- dimension parsing & formatting ---------- */

// Parse "48", "48.5", "48 1/2", "1/2", "48-1/2"
function parseDim(str) {
  if (str === null || str === undefined) return NaN;
  const s = String(str).trim().replace(/["″]/g, "");
  if (!s) return NaN;
  const mixed = s.match(/^(\d+)[\s-]+(\d+)\s*\/\s*(\d+)$/);
  if (mixed) return parseInt(mixed[1]) + parseInt(mixed[2]) / parseInt(mixed[3]);
  const frac = s.match(/^(\d+)\s*\/\s*(\d+)$/);
  if (frac) return parseInt(frac[1]) / parseInt(frac[2]);
  const num = parseFloat(s);
  return isNaN(num) ? NaN : num;
}

// Format decimal inches as nearest 1/16 fraction, e.g. 48.5 -> 48 1/2"
function fmtIn(v) {
  if (isNaN(v)) return "—";
  const sign = v < 0 ? "-" : "";
  v = Math.abs(v);
  let whole = Math.floor(v);
  let sixteenths = Math.round((v - whole) * 16);
  if (sixteenths === 16) { whole += 1; sixteenths = 0; }
  if (sixteenths === 0) return `${sign}${whole}"`;
  let n = sixteenths, d = 16;
  while (n % 2 === 0) { n /= 2; d /= 2; }
  return whole === 0 ? `${sign}${n}/${d}"` : `${sign}${whole} ${n}/${d}"`;
}

const DimText = ({ x, y, children, anchor = "middle", size = TXT }) => (
  <g>
    <text x={x} y={y} textAnchor={anchor} fontFamily={FONT} fontSize={size}
      fill={LINE} paintOrder="stroke" stroke="#ffffff" strokeWidth="3.5" strokeLinejoin="round">
      {children}
    </text>
    <text x={x} y={y} textAnchor={anchor} fontFamily={FONT} fontSize={size} fill={LINE}>
      {children}
    </text>
  </g>
);

// Horizontal dimension: geometry edges at yObj, dim line at y
const DimH = ({ x1, x2, y, yObj, label }) => {
  const dir = y < yObj ? 1 : -1;
  return (
    <g stroke={LINE} strokeWidth={THIN} fill="none">
      <line x1={x1} y1={yObj - dir * 3} x2={x1} y2={y + dir * 5} />
      <line x1={x2} y1={yObj - dir * 3} x2={x2} y2={y + dir * 5} />
      <line x1={x1} y1={y} x2={x2} y2={y} markerStart="url(#arrS)" markerEnd="url(#arrE)" />
      <DimText x={(x1 + x2) / 2} y={y - 5}>{label}</DimText>
    </g>
  );
};

// Vertical dimension: geometry edges at xObj, dim line at x
const DimV = ({ y1, y2, x, xObj, label }) => {
  const dir = x < xObj ? 1 : -1;
  const cx = x, cy = (y1 + y2) / 2;
  return (
    <g stroke={LINE} strokeWidth={THIN} fill="none">
      <line x1={xObj - dir * 3} y1={y1} x2={x + dir * 5} y2={y1} />
      <line x1={xObj - dir * 3} y1={y2} x2={x + dir * 5} y2={y2} />
      <line x1={x} y1={y1} x2={x} y2={y2} markerStart="url(#arrS)" markerEnd="url(#arrE)" />
      <g transform={`rotate(-90 ${cx} ${cy})`}>
        <DimText x={cx} y={cy - 5}>{label}</DimText>
      </g>
    </g>
  );
};

// Leader callout from a point, elbow to text
const Leader = ({ px, py, tx, ty, lines, anchor }) => {
  const a = anchor || (tx > px ? "start" : "end");
  const elbow = a === "start" ? tx - 8 : tx + 8;
  return (
    <g>
      <line x1={px} y1={py} x2={elbow} y2={ty} stroke={LINE} strokeWidth={THIN} markerStart="url(#dot)" />
      <line x1={elbow} y1={ty} x2={tx} y2={ty} stroke={LINE} strokeWidth={THIN} />
      {lines.map((l, i) => (
        <DimText key={i} x={a === "start" ? tx + 4 : tx - 4} y={ty + 4 + i * 14} anchor={a}>{l}</DimText>
      ))}
    </g>
  );
};



// Text guaranteed to fit within maxW: shrinks font size first, then compresses
// glyph spacing as a hard stop. Nothing rendered with FitText can overflow.
const FitText = ({ x, y, maxW, size = 11, weight, children }) => {
  const s = String(children);
  const CH = 0.65; // monospace advance width factor (conservative)
  let fs = size;
  if (s.length * CH * fs > maxW) fs = Math.max(7.5, maxW / (s.length * CH));
  const stillOver = s.length * CH * fs > maxW + 0.5;
  return (
    <text x={x} y={y} fontFamily={FONT} fontSize={fs} fontWeight={weight} fill={LINE}
      textLength={stillOver ? maxW : undefined}
      lengthAdjust={stillOver ? "spacingAndGlyphs" : undefined}>{s}</text>
  );
};


// shift an ignition cut-out position until it clears vertical tube obstructions
// (x0 and bars in the same units; halfW = cut half-width + tube half-width + margin)
function clearIgnX(x0, bars, halfW) {
  const hit = (x) => bars.some((c) => Math.abs(x - c) < halfW);
  if (!hit(x0)) return x0;
  const sorted = [...bars].sort((a, b) => a - b);
  for (let i = 0; i < sorted.length; i++) {
    if (Math.abs(x0 - sorted[i]) < halfW) {
      const next = sorted[i + 1];
      const cand = next !== undefined ? (sorted[i] + next) / 2 : sorted[i] + halfW + 0.5;
      if (!hit(cand)) return cand;
    }
  }
  return x0;
}

// which inlet indexes receive the 2x2 ignition cut-out
function igniterIdxs(p, count) {
  if (!p.igniter) return [];
  if (p.igniterAll) return Array.from({ length: count }, (_, i) => i);
  return [Math.floor((count - 1) / 2)]; // center-most inlet
}
// 2x2 cut-out square (plan view) with (2) 1/4"Ø holes, 3/16" above and below
const IgnSquare = ({ x, y, scale }) => {
  const h = Math.max(scale, 6); // half of 2" square
  const hr = Math.max(scale * 0.125, 1.8); // 1/4"Ø hole radius
  const off = h + Math.max(scale * 0.1875, 2.6); // hole center 3/16" off the cut edge
  return (
    <g>
      <rect x={x - h} y={y - h} width={h * 2} height={h * 2} fill="none" stroke={LINE} strokeWidth={OBJ} />
      <circle cx={x} cy={y - off} r={hr} fill="none" stroke={LINE} strokeWidth={THIN} />
      <circle cx={x} cy={y + off} r={hr} fill="none" stroke={LINE} strokeWidth={THIN} />
    </g>
  );
};

// Balloon callout: circled key letter with a short leader, referenced in the CALLOUTS legend
const Balloon = ({ x, y, k, dx = 26, dy = -26 }) => {
  const bx = x + dx, by = y + dy;
  return (
    <g>
      <line x1={x} y1={y} x2={bx + (dx >= 0 ? -9 : 9) * 0} y2={by} stroke={LINE} strokeWidth={THIN} markerStart="url(#dot)" />
      <circle cx={bx} cy={by} r={10} fill="#ffffff" stroke={LINE} strokeWidth="1.4" />
      <text x={bx} y={by + 4} textAnchor="middle" fontFamily={FONT} fontSize={11.5} fontWeight="700" fill={LINE}>{k}</text>
    </g>
  );
};

/* ---------- geometry generators (return SVG groups) ---------- */

// px positions of evenly distributed inlets along a length
function inletFractions(n) {
  return Array.from({ length: n }, (_, i) => (2 * i + 1) / (2 * n));
}

/* ---------- burner-in-pan overlay ---------- */
// Draws a burner centered at (cx, cy) at the pan's scale, with one summary callout.
function BurnerOverlay({ b, cx, cy, scale, inletD, inletLabel, inlets, co, igniter, igniterAll, holeD, holes, upD, upL }) {
  const inletR = Math.max((inletD / 2) * scale, 3.5);
  const dashedInlet = (x, y, key) => (
    <circle key={key} cx={x} cy={y} r={inletR} fill="none" stroke={LINE} strokeWidth={THIN} strokeDasharray="4 3" />
  );

  if (b.type === "tburner") {
    const pw = b.bL * scale;
    const th = Math.max(b.tube * scale, 6);
    const ox = cx - pw / 2, oy = cy - th / 2;
    const fr = inletFractions(inlets);
    const nPorts = Math.min(40, Math.max(10, Math.floor(b.bL / 2)));
    return (
      <g>
        <rect x={ox} y={oy} width={pw} height={th} rx={th / 2} fill="none" stroke={LINE} strokeWidth={OBJ} />
        {Array.from({ length: nPorts }, (_, i) => (
          <circle key={i} cx={ox + ((i + 0.5) / nPorts) * pw} cy={oy + th * 0.3} r={1.2} fill={LINE} />
        ))}
        {(() => {
          const hf = inletFractions(holes);
          const hr = Math.max((holeD / 2) * scale, 4);
          return (
            <g>
              {hf.map((f, i) => <circle key={i} cx={ox + f * pw} cy={cy} r={hr} fill="none" stroke={LINE} strokeWidth={OBJ} />)}
              {igniterIdxs({ igniter, igniterAll }, holes).map((ii) => (
                <IgnSquare key={`ig${ii}`} x={ox + hf[ii] * pw + 2 * scale} y={cy + th / 2 + scale} scale={scale} />
              ))}
              {igniter && co.igniter && (
                <Balloon x={ox + hf[igniterIdxs({ igniter, igniterAll }, holes)[0]] * pw + 2 * scale + Math.max(scale, 6)} y={cy + th / 2 + scale + Math.max(scale, 6)} k={co.igniter} dx={26} dy={26} />
              )}
              <Balloon x={ox + hf[0] * pw - hr} y={cy} k={co.binlet} dx={-28} dy={28} />
            </g>
          );
        })()}
        <Balloon x={ox + pw * 0.78} y={oy + 1} k={co.burner} dx={30} dy={-24} />
      </g>
    );
  }

  if (b.type === "hburner") {
    const rows = Math.max(2, b.rows || 2);
    const pw = b.bL * scale, ph = b.bW * scale;
    const th = Math.max(b.tube * scale, 6);
    const ox = cx - pw / 2, oyT = cy - ph / 2, oyB = cy + ph / 2 - th;
    const rowY = Array.from({ length: rows }, (_, i) => oyT + (i / (rows - 1)) * (oyB - oyT));
    const fr = inletFractions(inlets);
    const nPorts = Math.min(36, Math.max(10, Math.floor(b.bL / 2)));
    return (
      <g>
        {rowY.map((yy, r) => (
          <g key={r}>
            <rect x={ox} y={yy} width={pw} height={th} rx={th / 2} fill="none" stroke={LINE} strokeWidth={OBJ} />
            {Array.from({ length: nPorts }, (_, i) => (
              <circle key={i} cx={ox + ((i + 0.5) / nPorts) * pw} cy={yy + th * 0.3} r={1.2} fill={LINE} />
            ))}
          </g>
        ))}
        {fr.map((f, i) => {
          const gx = ox + f * pw;
          return (
            <g key={i}>
              <line x1={gx - th / 2} y1={oyT + th} x2={gx - th / 2} y2={oyB} stroke={LINE} strokeWidth={OBJ} />
              <line x1={gx + th / 2} y1={oyT + th} x2={gx + th / 2} y2={oyB} stroke={LINE} strokeWidth={OBJ} />
            </g>
          );
        })}
        {(() => {
          const hf = inletFractions(holes);
          const hr = Math.max((holeD / 2) * scale, 4);
          const bars = fr.map((f) => ox + f * pw); // crossbar centers (px)
          const halfW = (1 + b.tube / 2 + 0.15) * scale;
          const igX = (ii) => clearIgnX(ox + hf[ii] * pw + 2 * scale, bars, halfW);
          return (
            <g>
              {hf.map((f, i) => <circle key={i} cx={ox + f * pw} cy={cy} r={hr} fill="none" stroke={LINE} strokeWidth={OBJ} />)}
              {igniterIdxs({ igniter, igniterAll }, holes).map((ii) => (
                <IgnSquare key={`ig${ii}`} x={igX(ii)} y={cy} scale={scale} />
              ))}
              {igniter && co.igniter && (
                <Balloon x={igX(igniterIdxs({ igniter, igniterAll }, holes)[0]) + Math.max(scale, 6)} y={cy + Math.max(scale, 6)} k={co.igniter} dx={26} dy={30} />
              )}
              <Balloon x={ox + hf[0] * pw - hr} y={cy} k={co.binlet} dx={-28} dy={26} />
            </g>
          );
        })()}
        <Balloon x={ox + pw * 0.82} y={oyT + 1} k={co.burner} dx={28} dy={-22} />
      </g>
    );
  }

  if (b.type === "round") {
    const R = b.bDia / 2;
    const t = Math.min(b.tube, R / Math.max(b.rings, 1));
    const cOut = R - t / 2;
    const centers = Array.from({ length: b.rings }, (_, i) => ((i + 1) / b.rings) * cOut);
    const tPx = Math.max(t * scale, 4);
    return (
      <g>
        {centers.map((c, i) => (
          <g key={i}>
            <circle cx={cx} cy={cy} r={c * scale + tPx / 2} fill="none" stroke={LINE} strokeWidth={OBJ} />
            <circle cx={cx} cy={cy} r={Math.max(c * scale - tPx / 2, 1)} fill="none" stroke={LINE} strokeWidth={OBJ} />
          </g>
        ))}
        {centers.map((c, i) => {
          const nPorts = Math.min(72, Math.max(8, Math.floor((2 * Math.PI * c) / 2)));
          return Array.from({ length: nPorts }, (_, k) => {
            const a = (k / nPorts) * 2 * Math.PI;
            return <circle key={`${i}-${k}`} cx={cx + Math.cos(a) * c * scale} cy={cy + Math.sin(a) * c * scale} r={1.2} fill={LINE} />;
          });
        })}
        {(() => {
          const armW = tPx / 2;
          const reach = centers[b.rings - 1] * scale;
          return (
            <g stroke={LINE} strokeWidth={OBJ} fill="none">
              <line x1={cx - reach} y1={cy - armW} x2={cx + reach} y2={cy - armW} />
              <line x1={cx - reach} y1={cy + armW} x2={cx + reach} y2={cy + armW} />
              <line x1={cx - armW} y1={cy - reach} x2={cx - armW} y2={cy + reach} />
              <line x1={cx + armW} y1={cy - reach} x2={cx + armW} y2={cy + reach} />
              <circle cx={cx} cy={cy} r={tPx * 1.1} />
            </g>
          );
        })()}
        {(() => {
          const ur = Math.max((upD / 2) * scale, 4);
          return (
            <g>
              <circle cx={cx} cy={cy} r={ur} fill="none" stroke={LINE} strokeWidth={OBJ} />
              <circle cx={cx} cy={cy} r={ur * 0.72} fill="none" stroke={LINE} strokeWidth={THIN} />
              <Balloon x={cx - ur} y={cy} k={co.binlet} dx={-28} dy={-28} />
            </g>
          );
        })()}
        {(() => {
          const midR = (b.rings >= 2 ? (1.5 * cOut) / b.rings : 0.5 * cOut) * scale;
          const dx45 = midR * 0.7071, dy45 = midR * 0.7071; // 45° — clear of both cross spokes
          return (
            <g>
              {igniter && <IgnSquare x={cx + dx45} y={cy + dy45} scale={scale} />}
              {igniter && co.igniter && (
                <Balloon x={cx + dx45 + Math.max(scale, 6)} y={cy + dy45 + Math.max(scale, 6)} k={co.igniter} dx={28} dy={26} />
              )}
            </g>
          );
        })()}
        <Balloon x={cx + centers[b.rings - 1] * scale * 0.72} y={cy - centers[b.rings - 1] * scale * 0.72} k={co.burner} dx={26} dy={-24} />
        <Balloon x={cx} y={cy + Math.max((b.inletD / 2) * scale, 3.5)} k={co.binlet} dx={-26} dy={28} />
      </g>
    );
  }
  return null;
}

function DropInPanDrawing({ p, area }) {
  const { L, W, D, flange, inletLabel, inletD, inlets, split } = p;
  const oL = L + 2 * flange, oW = W + 2 * flange;
  const gapY = 60; // gap between top view and section view (px)
  // scale to fit top view + section stacked
  const sectH = D + flange; // approx real height of section in inches (flange lip small)
  const s = Math.min(area.w / oL, (area.h - gapY - 70) / (oW + Math.max(sectH, 2) + 30 / 10));
  const scale = Math.min(s, area.w / oL);
  const pw = oL * scale, ph = oW * scale;
  const ox = area.x + (area.w - pw) / 2;
  const oy = area.y + 8;
  const fx = flange * scale;
  const ix = ox + fx, iy = oy + fx, iw = L * scale, ih = W * scale;
  const cx = ox + pw / 2, cy = oy + ph / 2;
  const inletR = Math.max((inletD / 2) * scale, 4);

  // section view
  const sy = oy + ph + gapY + 26;
  const sScale = scale;
  const sD = Math.max(D * sScale, 26);
  const lip = Math.max(3, 0.09 * sScale * 10);

  const weepR = Math.max((3 / 32) * scale, 2.2);
  const weepOff = Math.max(0.6 * scale, 9);
  const corners = [
    [ix + weepOff, iy + weepOff, 1, 1],
    [ix + iw - weepOff, iy + weepOff, -1, 1],
    [ix + weepOff, iy + ih - weepOff, 1, -1],
    [ix + iw - weepOff, iy + ih - weepOff, -1, -1],
  ];

  return (
    <g>
      {/* TOP VIEW */}
      <DimText x={ox} y={oy - 14} anchor="start" size={12.5}>TOP VIEW</DimText>
      <rect x={ox} y={oy} width={pw} height={ph} fill="none" stroke={LINE} strokeWidth={OBJ} />
      <rect x={ix} y={iy} width={iw} height={ih} fill="none" stroke={LINE} strokeWidth={OBJ} />
      <CenterlineH x1={ox - 14} x2={ox + pw + 14} y={cy} />
      <CenterlineV y1={oy - 14} y2={oy + ph + 14} x={cx} />
      {/* weep holes: 3 per corner */}
      {corners.map(([wx, wy, dx, dy], ci) => (
        <g key={ci}>
          <circle cx={wx} cy={wy} r={weepR} fill="none" stroke={LINE} strokeWidth={THIN} />
          <circle cx={wx + dx * weepOff} cy={wy} r={weepR} fill="none" stroke={LINE} strokeWidth={THIN} />
          <circle cx={wx} cy={wy + dy * weepOff} r={weepR} fill="none" stroke={LINE} strokeWidth={THIN} />
        </g>
      ))}
      <Balloon x={ix + iw - weepOff} y={iy + weepOff} k={p.co.weep} dx={30} dy={-22} />
      {/* inlets or burner assembly */}
      {!p.burner && inletFractions(inlets).map((f, i) => {
        const gx = ix + f * iw;
        return <circle key={i} cx={gx} cy={cy} r={inletR} fill="none" stroke={LINE} strokeWidth={OBJ} />;
      })}
      {!p.burner && (
        <Balloon x={ix + inletFractions(inlets)[0] * iw - inletR} y={cy} k={p.co.inlet} dx={-28} dy={-24} />
      )}
      {!p.burner && igniterIdxs(p, inlets).map((ii) => (
        <IgnSquare key={`ig${ii}`} x={ix + inletFractions(inlets)[ii] * iw + 2 * scale} y={cy + inletR + scale} scale={scale} />
      ))}
      {!p.burner && p.igniter && p.co.igniter && (
        <Balloon x={ix + inletFractions(inlets)[igniterIdxs(p, inlets)[0]] * iw + 2 * scale + Math.max(scale, 6)} y={cy + inletR + scale + Math.max(scale, 6)} k={p.co.igniter} dx={28} dy={24} />
      )}
      {p.burner && (
        <BurnerOverlay b={p.burner} cx={cx} cy={cy} scale={scale}
          inletD={p.burner.inletD} inletLabel={p.burner.inletLabel} inlets={p.burner.inlets} co={p.co}
          igniter={p.igniter} igniterAll={p.igniterAll}
          holeD={p.holeD} holes={p.holes} upD={p.upD} upL={p.upL} />
      )}
      {/* split line */}
      {split && (
        <g>
          <line x1={cx} y1={oy - 6} x2={cx} y2={oy + ph + 6} stroke={LINE} strokeWidth={OBJ} strokeDasharray="10 6" />
          <DimText x={cx} y={oy + ph + 22}>SPLIT LINE — FAB IN (2) SECTIONS</DimText>
        </g>
      )}
      {/* dimensions */}
      <DimH x1={ix} x2={ix + iw} y={oy - 26} yObj={iy} label={`${fmtIn(L)} I.D.`} />
      <DimH x1={ox} x2={ox + pw} y={oy + ph + (split ? 48 : 34)} yObj={oy + ph} label={`${fmtIn(oL)} O.A. (FLANGE)`} />
      <DimV y1={iy} y2={iy + ih} x={ox - 34} xObj={ix} label={`${fmtIn(W)} I.D.`} />
      <DimV y1={oy} y2={oy + ph} x={ox + pw + 40} xObj={ox + pw} label={`${fmtIn(oW)} O.A.`} />
      <Balloon x={ox + fx / 2} y={oy + ph - fx / 2} k={p.co.flange} dx={-26} dy={24} />
      {p.co.fill && <Balloon x={ix + iw * 0.16} y={iy + ih * 0.3} k={p.co.fill} dx={-26} dy={-22} />}

      {/* SECTION VIEW */}
      <DimText x={ox} y={sy - 12} anchor="start" size={12.5}>SECTION A-A</DimText>
      {/* flange lips */}
      <line x1={ox} y1={sy} x2={ox + fx} y2={sy} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + pw - fx} y1={sy} x2={ox + pw} y2={sy} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox} y1={sy + lip} x2={ox + fx} y2={sy + lip} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + pw - fx} y1={sy + lip} x2={ox + pw} y2={sy + lip} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox} y1={sy} x2={ox} y2={sy + lip} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + pw} y1={sy} x2={ox + pw} y2={sy + lip} stroke={LINE} strokeWidth={OBJ} />
      {/* pan walls + floor */}
      <line x1={ox + fx} y1={sy} x2={ox + fx} y2={sy + sD} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + pw - fx} y1={sy} x2={ox + pw - fx} y2={sy + sD} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + fx} y1={sy + sD} x2={ox + pw - fx} y2={sy + sD} stroke={LINE} strokeWidth={OBJ} />
      {/* burner tube profile on floor (section) */}
      {p.burner && (p.burner.type === "tburner" || p.burner.type === "hburner") && (() => {
        const tr = Math.max((p.burner.tube / 2) * scale, 4);
        const bpw = p.burner.bL * scale;
        const bx1 = ox + pw / 2 - bpw / 2, bx2 = ox + pw / 2 + bpw / 2;
        return (
          <g stroke={LINE} strokeWidth={THIN} fill="none">
            <line x1={bx1} y1={sy + sD - tr * 2} x2={bx2} y2={sy + sD - tr * 2} />
            <line x1={bx1} y1={sy + sD} x2={bx1} y2={sy + sD - tr * 2} />
            <line x1={bx2} y1={sy + sD} x2={bx2} y2={sy + sD - tr * 2} />
          </g>
        );
      })()}
      {p.burner && p.burner.type === "round" && (() => {
        const tr = 4;
        const bR = (p.burner.bDia / 2) * scale;
        return (
          <g stroke={LINE} strokeWidth={THIN} fill="none">
            <circle cx={ox + pw / 2 - bR} cy={sy + sD - tr} r={tr} />
            <circle cx={ox + pw / 2 + bR} cy={sy + sD - tr} r={tr} />
          </g>
        );
      })()}
      {/* inlet stubs on floor */}
      {inletFractions(inlets).map((f, i) => {
        const gx = ox + fx + f * iw;
        return (
          <g key={i} stroke={LINE} strokeWidth={OBJ} fill="none">
            <line x1={gx - inletR} y1={sy + sD} x2={gx - inletR} y2={sy + sD + 14} />
            <line x1={gx + inletR} y1={sy + sD} x2={gx + inletR} y2={sy + sD + 14} />
          </g>
        );
      })}
      <DimV y1={sy} y2={sy + sD} x={ox + pw + 40} xObj={ox + pw} label={`${fmtIn(D)} DEEP`} />
    </g>
  );
}

function FlatPanDrawing({ p, area }) {
  const { L, W, inletLabel, inletD, inlets, split } = p;
  const scale = Math.min(area.w / L, (area.h - 60) / W);
  const pw = L * scale, ph = W * scale;
  const ox = area.x + (area.w - pw) / 2;
  const oy = area.y + (area.h - ph) / 2 - 10;
  const cx = ox + pw / 2, cy = oy + ph / 2;
  const inletR = Math.max((inletD / 2) * scale, 4);
  return (
    <g>
      <DimText x={ox} y={oy - 14} anchor="start" size={12.5}>TOP VIEW — FLAT PAN</DimText>
      <rect x={ox} y={oy} width={pw} height={ph} fill="none" stroke={LINE} strokeWidth={OBJ} />
      {p.co.fill && <Balloon x={ox + pw * 0.16} y={oy + ph * 0.3} k={p.co.fill} dx={-26} dy={-22} />}
      <CenterlineH x1={ox - 14} x2={ox + pw + 14} y={cy} />
      <CenterlineV y1={oy - 14} y2={oy + ph + 14} x={cx} />
      {!p.burner && inletFractions(inlets).map((f, i) => (
        <circle key={i} cx={ox + f * pw} cy={cy} r={inletR} fill="none" stroke={LINE} strokeWidth={OBJ} />
      ))}
      {!p.burner && (
        <Balloon x={ox + inletFractions(inlets)[0] * pw - inletR} y={cy} k={p.co.inlet} dx={-28} dy={-24} />
      )}
      {!p.burner && igniterIdxs(p, inlets).map((ii) => (
        <IgnSquare key={`ig${ii}`} x={ox + inletFractions(inlets)[ii] * pw + 2 * scale} y={cy + inletR + scale} scale={scale} />
      ))}
      {!p.burner && p.igniter && p.co.igniter && (
        <Balloon x={ox + inletFractions(inlets)[igniterIdxs(p, inlets)[0]] * pw + 2 * scale + Math.max(scale, 6)} y={cy + inletR + scale + Math.max(scale, 6)} k={p.co.igniter} dx={28} dy={24} />
      )}
      {p.burner && (
        <BurnerOverlay b={p.burner} cx={cx} cy={cy} scale={scale}
          inletD={p.burner.inletD} inletLabel={p.burner.inletLabel} inlets={p.burner.inlets} co={p.co}
          igniter={p.igniter} igniterAll={p.igniterAll}
          holeD={p.holeD} holes={p.holes} upD={p.upD} upL={p.upL} />
      )}
      {split && (
        <g>
          <line x1={cx} y1={oy - 6} x2={cx} y2={oy + ph + 6} stroke={LINE} strokeWidth={OBJ} strokeDasharray="10 6" />
          <DimText x={cx} y={oy + ph + 22}>SPLIT LINE — FAB IN (2) SECTIONS</DimText>
        </g>
      )}
      <DimH x1={ox} x2={ox + pw} y={oy - 28} yObj={oy} label={`${fmtIn(L)} O.A.`} />
      <DimV y1={oy} y2={oy + ph} x={ox - 34} xObj={ox} label={`${fmtIn(W)} O.A.`} />
    </g>
  );
}

function TBurnerDrawing({ p, area }) {
  const { L, tube, inletLabel, inletD, inlets } = p;
  const scale = Math.min(area.w / L, (area.h - 80) / Math.max(tube * 6, 6));
  const pw = L * scale;
  const th = Math.max(tube * scale, 8);
  const ox = area.x + (area.w - pw) / 2;
  const cy = area.y + area.h * 0.42;
  const oy = cy - th / 2;
  const stubW = Math.max(inletD * scale, 8);
  const stubL = Math.max(th * 1.6, 26);
  const fr = inletFractions(inlets);
  // port dots along top of tube
  const nPorts = Math.min(40, Math.max(10, Math.floor(L / 2)));
  return (
    <g>
      <DimText x={ox} y={oy - 30} anchor="start" size={12.5}>TOP VIEW — LINEAR "T" BURNER</DimText>
      <rect x={ox} y={oy} width={pw} height={th} rx={th / 2} fill="none" stroke={LINE} strokeWidth={OBJ} />
      <CenterlineH x1={ox - 16} x2={ox + pw + 16} y={cy} />
      {Array.from({ length: nPorts }, (_, i) => (
        <circle key={i} cx={ox + ((i + 0.5) / nPorts) * pw} cy={oy + th * 0.28} r={1.4} fill={LINE} />
      ))}
      {fr.map((f, i) => {
        const gx = ox + f * pw;
        return (
          <g key={i} stroke={LINE} strokeWidth={OBJ} fill="none">
            <line x1={gx - stubW / 2} y1={oy + th} x2={gx - stubW / 2} y2={oy + th + stubL} />
            <line x1={gx + stubW / 2} y1={oy + th} x2={gx + stubW / 2} y2={oy + th + stubL} />
            <line x1={gx - stubW / 2} y1={oy + th + stubL} x2={gx + stubW / 2} y2={oy + th + stubL} />
            <CenterlineV y1={oy - 10} y2={oy + th + stubL + 10} x={gx} />
          </g>
        );
      })}
      <Balloon x={ox + fr[0] * pw + stubW / 2} y={oy + th + stubL * 0.7} k={p.co.inlet} dx={30} dy={20} />
      {inlets === 1 && (
        <DimH x1={ox} x2={ox + pw / 2} y={oy + th + stubL + 34} yObj={oy + th} label={`${fmtIn(L / 2)} (CENTERED)`} />
      )}
      {inlets > 1 && fr.map((f, i) => (
        <DimH key={i} x1={i === 0 ? ox : ox + fr[i - 1] * pw} x2={ox + f * pw}
          y={oy + th + stubL + 34} yObj={oy + th}
          label={fmtIn(i === 0 ? L * f : L * (f - fr[i - 1]))} />
      ))}
      <DimH x1={ox} x2={ox + pw} y={oy - 22} yObj={oy} label={`${fmtIn(L)} O.A.`} />
    </g>
  );
}

function HBurnerDrawing({ p, area }) {
  const { L, W, tube, inletLabel, inletD, inlets } = p;
  const rows = Math.max(2, p.rows || 2);
  const scale = Math.min(area.w / L, (area.h - 90) / Math.max(W, tube * 4));
  const pw = L * scale, ph = W * scale;
  const th = Math.max(tube * scale, 8);
  const ox = area.x + (area.w - pw) / 2;
  const oy = area.y + (area.h - ph) / 2 - 14;
  const yTop = oy, yBot = oy + ph - th;
  // row centerlines equally spaced across the width (outer rows flush to O.A.)
  const rowY = Array.from({ length: rows }, (_, i) => yTop + (i / (rows - 1)) * (yBot - yTop));
  const fr = inletFractions(inlets);
  const inletR = Math.max((inletD / 2) * scale, 4);
  const nPorts = Math.min(36, Math.max(10, Math.floor(L / 2)));
  return (
    <g>
      <DimText x={ox} y={oy - 30} anchor="start" size={12.5}>TOP VIEW — "H" BURNER</DimText>
      {/* burner tube rows */}
      {rowY.map((yy, r) => (
        <g key={r}>
          <rect x={ox} y={yy} width={pw} height={th} rx={th / 2} fill="none" stroke={LINE} strokeWidth={OBJ} />
          {Array.from({ length: nPorts }, (_, i) => (
            <circle key={i} cx={ox + ((i + 0.5) / nPorts) * pw} cy={yy + th * 0.28} r={1.4} fill={LINE} />
          ))}
        </g>
      ))}
      {rowY.map((yy, r) => (
        <CenterlineH key={`cl${r}`} x1={ox - 16} x2={ox + pw + 16} y={yy + th / 2} />
      ))}
      {/* crossbars, one per inlet */}
      {fr.map((f, i) => {
        const gx = ox + f * pw;
        return (
          <g key={i}>
            <line x1={gx - th / 2} y1={yTop + th} x2={gx - th / 2} y2={yBot} stroke={LINE} strokeWidth={OBJ} />
            <line x1={gx + th / 2} y1={yTop + th} x2={gx + th / 2} y2={yBot} stroke={LINE} strokeWidth={OBJ} />
            <CenterlineV y1={yTop - 12} y2={yBot + th + 12} x={gx} />
            <circle cx={gx} cy={(yTop + th / 2 + yBot + th / 2) / 2} r={inletR} fill="none" stroke={LINE} strokeWidth={OBJ} />
          </g>
        );
      })}
      <Balloon x={ox + fr[0] * pw - inletR} y={(yTop + yBot + th) / 2} k={p.co.inlet} dx={-28} dy={-24} />
      <DimH x1={ox} x2={ox + pw} y={oy - 22} yObj={yTop} label={`${fmtIn(L)} O.A.`} />
      <DimV y1={yTop} y2={yBot + th} x={ox + pw + 40} xObj={ox + pw} label={`${fmtIn(W)} O.A.`} />
      {inlets > 1 && fr.map((f, i) => (
        <DimH key={i} x1={i === 0 ? ox : ox + fr[i - 1] * pw} x2={ox + f * pw}
          y={yBot + th + 34} yObj={yBot + th}
          label={fmtIn(i === 0 ? L * f : L * (f - fr[i - 1]))} />
      ))}
    </g>
  );
}

function RoundBurnerDrawing({ p, area }) {
  const { dia, rings, inletLabel, inletD, tube } = p;
  const R = dia / 2;
  const t = Math.min(tube, R / Math.max(rings, 1)); // clamp so rings can't overlap
  const scale = Math.min(area.w, area.h - 40) / dia * 0.92;
  const cx = area.x + area.w / 2;
  const cy = area.y + (area.h - 20) / 2 + 6;
  const inletR = Math.max((inletD / 2) * scale, 5);
  // ring tube centerlines: outer ring O.D. = overall dia, equally spaced
  const cOut = R - t / 2;
  const centers = Array.from({ length: rings }, (_, i) => ((i + 1) / rings) * cOut);
  const outerPx = R * scale;
  const tPx = Math.max(t * scale, 5);
  const spacing = cOut / rings;
  return (
    <g>
      <DimText x={cx - outerPx} y={cy - outerPx - 18} anchor="start" size={12.5}>TOP VIEW — RING BURNER</DimText>
      {/* each ring drawn as a tube: outer + inner wall */}
      {centers.map((c, i) => (
        <g key={i}>
          <circle cx={cx} cy={cy} r={c * scale + tPx / 2} fill="none" stroke={LINE} strokeWidth={OBJ} />
          <circle cx={cx} cy={cy} r={Math.max(c * scale - tPx / 2, 1)} fill="none" stroke={LINE} strokeWidth={OBJ} />
        </g>
      ))}
      {/* burner ports along each tube centerline */}
      {centers.map((c, i) => {
        const nPorts = Math.min(72, Math.max(8, Math.floor((2 * Math.PI * c) / 2)));
        return Array.from({ length: nPorts }, (_, k) => {
          const a = (k / nPorts) * 2 * Math.PI;
          return <circle key={`${i}-${k}`} cx={cx + Math.cos(a) * c * scale} cy={cy + Math.sin(a) * c * scale} r={1.4} fill={LINE} />;
        });
      })}
      {/* cross spokes: two full-width supply tubes through the center */}
      {(() => {
        const armW = tPx / 2;
        const reach = centers[rings - 1] * scale;
        return (
          <g stroke={LINE} strokeWidth={OBJ} fill="none">
            <line x1={cx - reach} y1={cy - armW} x2={cx + reach} y2={cy - armW} />
            <line x1={cx - reach} y1={cy + armW} x2={cx + reach} y2={cy + armW} />
            <line x1={cx - armW} y1={cy - reach} x2={cx - armW} y2={cy + reach} />
            <line x1={cx + armW} y1={cy - reach} x2={cx + armW} y2={cy + reach} />
          </g>
        );
      })()}
      {/* center hub */}
      <circle cx={cx} cy={cy} r={Math.max(tPx * 1.1, inletR * 1.25)} fill="none" stroke={LINE} strokeWidth={OBJ} />
      <CenterlineH x1={cx - outerPx - 18} x2={cx + outerPx + 18} y={cy} />
      <CenterlineV y1={cy - outerPx - 18} y2={cy + outerPx + 18} x={cx} />
      <circle cx={cx} cy={cy} r={inletR} fill="none" stroke={LINE} strokeWidth={OBJ} />
      {/* overall dia dim */}
      <g stroke={LINE} strokeWidth={THIN} fill="none">
        <line x1={cx - outerPx} y1={cy - outerPx - 6} x2={cx - outerPx} y2={cy - outerPx - 26} />
        <line x1={cx + outerPx} y1={cy - outerPx - 6} x2={cx + outerPx} y2={cy - outerPx - 26} />
        <line x1={cx - outerPx} y1={cy - outerPx - 20} x2={cx + outerPx} y2={cy - outerPx - 20} markerStart="url(#arrS)" markerEnd="url(#arrE)" />
        <DimText x={cx} y={cy - outerPx - 26}>{`Ø ${fmtIn(dia)} O.A.`}</DimText>
      </g>
      <Balloon x={cx} y={cy + inletR} k={p.co.inlet} dx={28} dy={26} />
      <Balloon x={cx - centers[rings - 1] * scale * 0.72} y={cy - centers[rings - 1] * scale * 0.72} k={p.co.rings} dx={-26} dy={-24} />
    </g>
  );
}

function RoundFlatPanDrawing({ p, area }) {
  const { dia, inletLabel, inletD, inlets, split } = p;
  const R = dia / 2;
  const scale = Math.min(area.w, area.h - 40) / dia * 0.9;
  const cx = area.x + area.w / 2;
  const cy = area.y + (area.h - 20) / 2 + 4;
  const rPx = R * scale;
  const inletR = Math.max((inletD / 2) * scale, 4);
  // inlets spaced evenly along horizontal centerline within a 0.7×dia chord
  const chord = dia * 0.7 * scale;
  const positions = inletFractions(inlets).map((f) => cx + (f - 0.5) * chord);
  return (
    <g>
      <DimText x={cx - rPx} y={cy - rPx - 18} anchor="start" size={12.5}>TOP VIEW — ROUND FLAT PAN</DimText>
      <circle cx={cx} cy={cy} r={rPx} fill="none" stroke={LINE} strokeWidth={OBJ} />
      {p.co.fill && <Balloon x={cx - rPx * 0.4} y={cy - rPx * 0.4} k={p.co.fill} dx={-26} dy={-24} />}
      <CenterlineH x1={cx - rPx - 18} x2={cx + rPx + 18} y={cy} />
      <CenterlineV y1={cy - rPx - 18} y2={cy + rPx + 18} x={cx} />
      {!p.burner && positions.map((px, i) => (
        <circle key={i} cx={px} cy={cy} r={inletR} fill="none" stroke={LINE} strokeWidth={OBJ} />
      ))}
      {!p.burner && (
        <Balloon x={positions[0] - inletR} y={cy} k={p.co.inlet} dx={-26} dy={-26} />
      )}
      {!p.burner && igniterIdxs(p, inlets).map((ii) => (
        <IgnSquare key={`ig${ii}`} x={positions[ii] + 2 * scale} y={cy + inletR + scale} scale={scale} />
      ))}
      {!p.burner && p.igniter && p.co.igniter && (
        <Balloon x={positions[igniterIdxs(p, inlets)[0]] + 2 * scale + Math.max(scale, 6)} y={cy + inletR + scale + Math.max(scale, 6)} k={p.co.igniter} dx={26} dy={24} />
      )}
      {p.burner && (
        <BurnerOverlay b={p.burner} cx={cx} cy={cy} scale={scale}
          inletD={p.burner.inletD} inletLabel={p.burner.inletLabel} inlets={p.burner.inlets} co={p.co}
          igniter={p.igniter} igniterAll={p.igniterAll}
          holeD={p.holeD} holes={p.holes} upD={p.upD} upL={p.upL} />
      )}
      {split && (
        <g>
          <line x1={cx} y1={cy - rPx - 8} x2={cx} y2={cy + rPx + 8} stroke={LINE} strokeWidth={OBJ} strokeDasharray="10 6" />
          <DimText x={cx} y={cy + rPx + 26}>SPLIT LINE — FAB IN (2) SECTIONS</DimText>
        </g>
      )}
      {/* overall dia dim */}
      <g stroke={LINE} strokeWidth={THIN} fill="none">
        <line x1={cx - rPx} y1={cy - rPx - 6} x2={cx - rPx} y2={cy - rPx - 26} />
        <line x1={cx + rPx} y1={cy - rPx - 6} x2={cx + rPx} y2={cy - rPx - 26} />
        <line x1={cx - rPx} y1={cy - rPx - 20} x2={cx + rPx} y2={cy - rPx - 20} markerStart="url(#arrS)" markerEnd="url(#arrE)" />
        <DimText x={cx} y={cy - rPx - 26}>{`Ø ${fmtIn(dia)} O.A.`}</DimText>
      </g>
    </g>
  );
}



function RoundDropInPanDrawing({ p, area }) {
  const { dia, D, flange, inletLabel, inletD, inlets, split } = p;
  const R = dia / 2, Ro = R + flange;
  const gapY = 56;
  const sectH = Math.max(D, 2) + 1;
  const scale = Math.min(area.w / (2 * Ro), (area.h - gapY - 70) / (2 * Ro + sectH + 2));
  const rIn = R * scale, rOut = Ro * scale;
  const cx = area.x + area.w / 2;
  const cy = area.y + rOut + 10;
  const inletR = Math.max((inletD / 2) * scale, 4);
  const chord = dia * 0.7 * scale;
  const positions = inletFractions(inlets).map((f) => cx + (f - 0.5) * chord);
  const weepR = Math.max((3 / 32) * scale, 2.2);
  const weepOff = Math.max(0.6 * scale, 9);

  // section
  const sy = cy + rOut + gapY + 26;
  const pw = 2 * rOut;
  const ox = cx - rOut;
  const fx = flange * scale;
  const sD = Math.max(D * scale, 26);
  const lip = 4;

  return (
    <g>
      {/* TOP VIEW */}
      <DimText x={cx - rOut} y={cy - rOut - 14} anchor="start" size={12.5}>TOP VIEW — ROUND DROP-IN PAN</DimText>
      <circle cx={cx} cy={cy} r={rOut} fill="none" stroke={LINE} strokeWidth={OBJ} />
      <circle cx={cx} cy={cy} r={rIn} fill="none" stroke={LINE} strokeWidth={OBJ} />
      {p.co.fill && <Balloon x={cx - rIn * 0.4} y={cy - rIn * 0.4} k={p.co.fill} dx={-26} dy={-24} />}
      <CenterlineH x1={cx - rOut - 14} x2={cx + rOut + 14} y={cy} />
      <CenterlineV y1={cy - rOut - 14} y2={cy + rOut + 14} x={cx} />
      {/* weep holes: (3) per quadrant near the wall */}
      {[45, 135, 225, 315].map((a) => {
        const rad = (a * Math.PI) / 180;
        const rw = rIn - weepOff;
        const px = cx + Math.cos(rad) * rw, py = cy + Math.sin(rad) * rw;
        const tx = -Math.sin(rad), ty = Math.cos(rad);
        return (
          <g key={a}>
            {[-1, 0, 1].map((k) => (
              <circle key={k} cx={px + tx * k * weepOff} cy={py + ty * k * weepOff} r={weepR}
                fill="none" stroke={LINE} strokeWidth={THIN} />
            ))}
          </g>
        );
      })}
      <Balloon x={cx + Math.cos(Math.PI / 4) * (rIn - weepOff)} y={cy - Math.sin(Math.PI / 4) * (rIn - weepOff)}
        k={p.co.weep} dx={28} dy={-24} />
      <Balloon x={cx + Math.cos((3 * Math.PI) / 4) * (rIn + fx / 2) * 0.98} y={cy - Math.sin((3 * Math.PI) / 4) * (rIn + fx / 2) * 0.98}
        k={p.co.flange} dx={-26} dy={-24} />
      {/* inlets / burner */}
      {!p.burner && positions.map((px, i) => (
        <circle key={i} cx={px} cy={cy} r={inletR} fill="none" stroke={LINE} strokeWidth={OBJ} />
      ))}
      {!p.burner && (
        <Balloon x={positions[0] - inletR} y={cy} k={p.co.inlet} dx={-26} dy={-26} />
      )}
      {!p.burner && igniterIdxs(p, inlets).map((ii) => (
        <IgnSquare key={`ig${ii}`} x={positions[ii] + 2 * scale} y={cy + inletR + scale} scale={scale} />
      ))}
      {!p.burner && p.igniter && p.co.igniter && (
        <Balloon x={positions[igniterIdxs(p, inlets)[0]] + 2 * scale + Math.max(scale, 6)} y={cy + inletR + scale + Math.max(scale, 6)} k={p.co.igniter} dx={26} dy={24} />
      )}
      {p.burner && (
        <BurnerOverlay b={p.burner} cx={cx} cy={cy} scale={scale}
          inletD={p.burner.inletD} inletLabel={p.burner.inletLabel} inlets={p.burner.inlets} co={p.co}
          igniter={p.igniter} igniterAll={p.igniterAll}
          holeD={p.holeD} holes={p.holes} upD={p.upD} upL={p.upL} />
      )}
      {split && (
        <g>
          <line x1={cx} y1={cy - rOut - 8} x2={cx} y2={cy + rOut + 8} stroke={LINE} strokeWidth={OBJ} strokeDasharray="10 6" />
          <DimText x={cx} y={cy + rOut + 24}>SPLIT LINE — FAB IN (2) SECTIONS</DimText>
        </g>
      )}
      {/* dims */}
      <g stroke={LINE} strokeWidth={THIN} fill="none">
        <line x1={cx - rIn} y1={cy - rOut - 6} x2={cx - rIn} y2={cy - rOut - 24} />
        <line x1={cx + rIn} y1={cy - rOut - 6} x2={cx + rIn} y2={cy - rOut - 24} />
        <line x1={cx - rIn} y1={cy - rOut - 18} x2={cx + rIn} y2={cy - rOut - 18} markerStart="url(#arrS)" markerEnd="url(#arrE)" />
        <DimText x={cx} y={cy - rOut - 24}>{`Ø ${fmtIn(dia)} I.D.`}</DimText>
        <line x1={cx - rOut} y1={cy - rOut - 6} x2={cx - rOut} y2={cy - rOut - 46} />
        <line x1={cx + rOut} y1={cy - rOut - 6} x2={cx + rOut} y2={cy - rOut - 46} />
        <line x1={cx - rOut} y1={cy - rOut - 40} x2={cx + rOut} y2={cy - rOut - 40} markerStart="url(#arrS)" markerEnd="url(#arrE)" />
        <DimText x={cx} y={cy - rOut - 46}>{`Ø ${fmtIn(2 * Ro)} O.A. (FLANGE)`}</DimText>
      </g>

      {/* SECTION A-A */}
      <DimText x={ox} y={sy - 12} anchor="start" size={12.5}>SECTION A-A</DimText>
      <line x1={ox} y1={sy} x2={ox + fx} y2={sy} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + pw - fx} y1={sy} x2={ox + pw} y2={sy} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox} y1={sy + lip} x2={ox + fx} y2={sy + lip} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + pw - fx} y1={sy + lip} x2={ox + pw} y2={sy + lip} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox} y1={sy} x2={ox} y2={sy + lip} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + pw} y1={sy} x2={ox + pw} y2={sy + lip} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + fx} y1={sy} x2={ox + fx} y2={sy + sD} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + pw - fx} y1={sy} x2={ox + pw - fx} y2={sy + sD} stroke={LINE} strokeWidth={OBJ} />
      <line x1={ox + fx} y1={sy + sD} x2={ox + pw - fx} y2={sy + sD} stroke={LINE} strokeWidth={OBJ} />
      {!p.burner && positions.map((px, i) => (
        <g key={i} stroke={LINE} strokeWidth={OBJ} fill="none">
          <line x1={px - inletR} y1={sy + sD} x2={px - inletR} y2={sy + sD + 14} />
          <line x1={px + inletR} y1={sy + sD} x2={px + inletR} y2={sy + sD + 14} />
        </g>
      ))}
      <DimV y1={sy} y2={sy + sD} x={ox + pw + 40} xObj={ox + pw} label={`${fmtIn(D)} DEEP`} />
    </g>
  );
}

// handle footprint in plan view: 6" grip with (2) mounting points
const HandlePlan = ({ x, y, scale }) => {
  const gl = 3 * scale, gw = Math.max(0.55 * scale, 4);
  const sr = Math.max(0.16 * scale, 1.8);
  return (
    <g stroke={LINE} fill="none">
      <rect x={x - gl} y={y - gw} width={gl * 2} height={gw * 2} rx={gw} strokeWidth={OBJ} />
      <circle cx={x - gl * 0.78} cy={y} r={sr} strokeWidth={THIN} />
      <circle cx={x + gl * 0.78} cy={y} r={sr} strokeWidth={THIN} />
    </g>
  );
};

function LidDrawing({ p, area }) {
  const { L, W, handles } = p;
  const gapY = 56;
  const elevH = 3; // inches reserved for the side elevation (lid + handle)
  const scale = Math.min(area.w / L, (area.h - gapY - 70) / (W + elevH + 1));
  const pw = L * scale, ph = W * scale;
  const ox = area.x + (area.w - pw) / 2;
  const oy = area.y + 8;
  const cx = ox + pw / 2, cy = oy + ph / 2;
  const fr = inletFractions(handles);

  // side elevation
  const ey = oy + ph + gapY + 20;
  const eh = Math.max(1.5 * scale, 16);
  const bumpH = Math.max(1.1 * scale, 10);
  const bumpW = 3 * scale;

  return (
    <g>
      {/* TOP VIEW */}
      <DimText x={ox} y={oy - 14} anchor="start" size={12.5}>TOP VIEW — PAN LID</DimText>
      <rect x={ox} y={oy} width={pw} height={ph} fill="none" stroke={LINE} strokeWidth={OBJ} />
      <CenterlineH x1={ox - 14} x2={ox + pw + 14} y={cy} />
      <CenterlineV y1={oy - 14} y2={oy + ph + 14} x={cx} />
      {fr.map((f, i) => <HandlePlan key={i} x={ox + f * pw} y={cy} scale={scale} />)}
      <Balloon x={ox + fr[0] * pw + 3 * scale} y={cy} k={p.co.handle} dx={28} dy={-26} />
      <Balloon x={ox + pw} y={oy + ph * 0.25} k={p.co.fit} dx={28} dy={-20} />
      <DimH x1={ox} x2={ox + pw} y={oy - 28} yObj={oy} label={`${fmtIn(L)} O.A.`} />
      <DimV y1={oy} y2={oy + ph} x={ox - 34} xObj={ox} label={`${fmtIn(W)} O.A.`} />
      {handles > 1 && fr.map((f, i) => (
        <DimH key={i} x1={i === 0 ? ox : ox + fr[i - 1] * pw} x2={ox + f * pw}
          y={oy + ph + 30} yObj={oy + ph}
          label={fmtIn(i === 0 ? L * f : L * (f - fr[i - 1]))} />
      ))}

      {/* SIDE ELEVATION */}
      <DimText x={ox} y={ey - 12} anchor="start" size={12.5}>SIDE ELEVATION</DimText>
      <rect x={ox} y={ey} width={pw} height={eh} fill="none" stroke={LINE} strokeWidth={OBJ} />
      {fr.map((f, i) => {
        const hx = ox + f * pw;
        return (
          <g key={i} stroke={LINE} strokeWidth={OBJ} fill="none">
            <path d={`M ${hx - bumpW} ${ey} L ${hx - bumpW} ${ey - bumpH * 0.6} Q ${hx - bumpW} ${ey - bumpH} ${hx - bumpW * 0.6} ${ey - bumpH} L ${hx + bumpW * 0.6} ${ey - bumpH} Q ${hx + bumpW} ${ey - bumpH} ${hx + bumpW} ${ey - bumpH * 0.6} L ${hx + bumpW} ${ey}`} />
          </g>
        );
      })}
      <DimV y1={ey} y2={ey + eh} x={ox + pw + 40} xObj={ox + pw} label={`${fmtIn(1.5)} H`} />
      <Balloon x={ox + pw * 0.12} y={ey + eh} k={p.co.skirt} dx={-26} dy={24} />
    </g>
  );
}

  return (
    <g>
      <DimText x={cx - rPx} y={cy - rPx - 18} anchor="start" size={12.5}>TOP VIEW — ROUND PAN LID</DimText>

      <CenterlineH x1={cx - rPx - 16} x2={cx + rPx + 16} y={cy} />

      <g stroke={LINE} strokeWidth={THIN} fill="none">
        <line x1={cx - rPx} y1={cy - rPx - 6} x2={cx - rPx} y2={cy - rPx - 26} />
        <line x1={cx + rPx} y1={cy - rPx - 6} x2={cx + rPx} y2={cy - rPx - 26} />

        <DimText x={cx} y={cy - rPx - 26}>{`Ø ${fmtIn(dia)} O.A.`}</DimText>

      {(() => {

      })}
      {Array.from({ length: nW - 1 }, (_, k) => {
        const sy = oy + ph * ((k + 1) / nW);

      <Balloon x={ox + pw * 0.7} y={oy + tPx / 2} k={p.co.glass} dx={28} dy={-24} />

                  <line x1={sx - 2} y1={ey + eh * 0.08 + clipH} x2={sx - 2} y2={ey + eh * 0.92 - clipH} strokeWidth={THIN} />

            {/* leveling feet at panel joints (corners carry their own) */}

            {p.co.feet && <Balloon x={ox + (0.5 / nL) * pw} y={ey + eh + 5} k={p.co.feet} dx={-26} dy={26} />}
            {/* bottom-edge retaining clips */}
            {[0.25, 0.75].map((q, i) => (
              <rect key={`t${i}`} x={ox + pw * q - tb} y={ey + eh - tb * 2} width={tb * 2} height={tb * 2}
                fill="none" stroke={LINE} strokeWidth={THIN} />

            <DimV y1={ey} y2={ey + eh} x={ox + pw + 40} xObj={ox + pw} label={`${fmtIn(H)} H`} />

/* ---------- sheet constants ---------- */

const SHEET_W = 1180, SHEET_H = 790;

/* ---------- isometric (sheet 2) ---------- */

// Product-photo style dimetric projection: long axis nearly horizontal,
// width axis receding at a steeper angle (matches studio reference shots)
const AXX = 0.975, AXY = 0.155;   // length axis direction
const AYX = 0.545, AYY = 0.44;    // width axis direction
const isoP = (x, y, z) => [x * AXX - y * AYX, x * AXY + y * AYY - z];

// --- lighting model ---
// Fixed directional light from upper-left-front. Flat faces get Lambert
// shading from their true 3D normal; tubes get screen-space metallic
// gradients; contact shadows + AO ground everything.
const LIGHT = (() => {
  const v = [-0.45, 0.3, 0.84];
  const n = Math.hypot(...v);
  return v.map((c) => c / n);
})();
function lambert(normal, interior) {
  const n = Math.hypot(...normal) || 1;
  const d = Math.max(0, (normal[0] * LIGHT[0] + normal[1] * LIGHT[1] + normal[2] * LIGHT[2]) / n);
  let v = 0.32 + 0.62 * d;
  if (interior) v *= 0.82;
  const g = Math.round(152 + v * 104);
  const c = (x) => Math.max(0, Math.min(255, x)).toString(16).padStart(2, "0");
  return `#${c(g - 4)}${c(g)}${c(g + 4)}`; // slight cool steel tint
}
function faceNormal(pts3) {
  const [a, b, c] = pts3;
  const u = [b[0] - a[0], b[1] - a[1], b[2] - a[2]];
  const w = [c[0] - a[0], c[1] - a[1], c[2] - a[2]];
  let n = [u[1] * w[2] - u[2] * w[1], u[2] * w[0] - u[0] * w[2], u[0] * w[1] - u[1] * w[0]];
  // orient outward-ish: prefer normals pointing up / toward viewer (+x,+y,+z half-space)
  if (n[2] < 0 || (n[2] === 0 && n[0] + n[1] < 0)) n = n.map((q) => -q);
  return n;
}

// convex hull (monotone chain)
function hull2(points) {
  const pts = points.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  if (pts.length < 3) return pts;
  const cross = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
  const lower = [], upper = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}

function buildIsoModel(product, p) {
  const mkLayer = () => ({ faces: [], shapes: [], dots: [] });
  const layers = [mkLayer(), mkLayer(), mkLayer()];

  const poly = (L, pts3, opts = {}) => L.shapes.push({ pts: pts3.map((q) => isoP(...q)), ...opts });
  const seg = (L, a, b, opts = {}) => poly(L, [a, b], opts);
  // Lambert-shaded flat face from 3D points
  const face3 = (L, pts3, opts = {}) =>
    L.faces.push({ subs: [pts3.map((q) => isoP(...q))], fill: opts.fill || lambert(faceNormal(pts3), opts.interior) });
  const face2 = (L, subs2d, fill) => L.faces.push({ subs: subs2d, fill });
  const shadowFace = (L, subs2d, strength = 0.18) => L.faces.push({ subs: subs2d, kind: "shadow", strength });
  const rect3 = (L, x0, y0, x1, y1, z, opts = {}) =>
    poly(L, [[x0, y0, z], [x1, y0, z], [x1, y1, z], [x0, y1, z], [x0, y0, z]], opts);
  const ringPts = (n, fn) => Array.from({ length: n + 1 }, (_, i) => fn((i / n) * 2 * Math.PI));
  const circPts2 = (cx, cy, z, r, n = 56) => ringPts(n, (a) => isoP(cx + Math.cos(a) * r, cy + Math.sin(a) * r, z));
  const circle3 = (L, cx, cy, z, r, opts = {}) => L.shapes.push({ pts: circPts2(cx, cy, z, r), ...opts });

  const silhouette = (L, e1, e2, opts, axis = 1) => {
    const iMin = (arr) => arr.reduce((m, q, i) => (q[axis] < arr[m][axis] ? i : m), 0);
    const iMax = (arr) => arr.reduce((m, q, i) => (q[axis] > arr[m][axis] ? i : m), 0);
    L.shapes.push({ pts: [e1[iMin(e1)], e2[iMin(e2)]], ...opts });
    L.shapes.push({ pts: [e1[iMax(e1)], e2[iMax(e2)]], ...opts });
  };

  // tube: hull-filled with a screen-space metallic gradient across its width
  const tubeGeneric = (L, e1, e2, opts, axis) => {
    const iMin = (arr) => arr.reduce((m, q, i) => (q[axis] < arr[m][axis] ? i : m), 0);
    const iMax = (arr) => arr.reduce((m, q, i) => (q[axis] > arr[m][axis] ? i : m), 0);
    L.faces.push({ subs: [hull2(e1.concat(e2))], kind: "tube", g1: e1[iMin(e1)], g2: e1[iMax(e1)] });
    L.shapes.push({ pts: e1, ...opts });
    L.shapes.push({ pts: e2, ...opts });
    silhouette(L, e1, e2, opts, axis);
  };
  const contactQuad = (L, pts3) => shadowFace(L, [pts3.map((q) => isoP(...q))], 0.2);
  const tubeX = (L, x1, x2, yc, zc, r, opts = {}, floorZ = null) => {
    if (floorZ !== null) contactQuad(L, [[x1 + 0.3, yc - r * 1.25 + 0.3, floorZ], [x2 + 0.3, yc - r * 1.25 + 0.3, floorZ], [x2 + 0.3, yc + r * 1.55 + 0.3, floorZ], [x1 + 0.3, yc + r * 1.55 + 0.3, floorZ]]);
    const end = (x) => ringPts(40, (a) => isoP(x, yc + Math.cos(a) * r, zc + Math.sin(a) * r));
    tubeGeneric(L, end(x1), end(x2), opts, 1);
  };
  const tubeY = (L, y1, y2, xc, zc, r, opts = {}, floorZ = null) => {
    if (floorZ !== null) contactQuad(L, [[xc - r * 1.25 + 0.3, y1 + 0.3, floorZ], [xc + r * 1.55 + 0.3, y1 + 0.3, floorZ], [xc + r * 1.55 + 0.3, y2 + 0.3, floorZ], [xc - r * 1.25 + 0.3, y2 + 0.3, floorZ]]);
    const end = (y) => ringPts(40, (a) => isoP(xc + Math.cos(a) * r, y, zc + Math.sin(a) * r));
    tubeGeneric(L, end(y1), end(y2), opts, 1);
  };
  const tubeZ = (L, z1, z2, xc, yc, r, opts = {}) => {
    const end = (z) => ringPts(40, (a) => isoP(xc + Math.cos(a) * r, yc + Math.sin(a) * r, z));
    tubeGeneric(L, end(z1), end(z2), opts, 0);
  };

  const portRowX = (L, x1, x2, y, zTop, count) => {
    for (let i = 0; i < count; i++) {
      const x = x1 + ((i + 0.5) / count) * (x2 - x1);
      L.dots.push(isoP(x, y, zTop));
    }
  };

  const LU = layers[0], LP = layers[1], LB = layers[2];

  // ground shadows shaped to the object's footprint, offset toward the light's far side
  const SHX = 0.7, SHY = 0.55;
  const shRect = (x0, y0, x1, y1, z, strength = 0.16, grow = 0.4) =>
    LU.faces.push({
      subs: [[[x0 - grow + SHX, y0 - grow + SHY, z], [x1 + grow + SHX, y0 - grow + SHY, z],
              [x1 + grow + SHX, y1 + grow + SHY, z], [x0 - grow + SHX, y1 + grow + SHY, z]].map((q) => isoP(...q))],
      kind: "shadow", strength,
    });
  const shCircle = (cx, cy, z, r, strength = 0.16, grow = 0.4) =>
    LU.faces.push({ subs: [circPts2(cx + SHX, cy + SHY, z, r + grow)], kind: "shadow", strength });
  const shHull = (subs2d, strength = 0.16) =>
    LU.faces.push({ subs: [hull2(subs2d.flat())], kind: "shadow", strength });
  const shRing = (outerSub, innerSub, strength = 0.12) =>
    LU.faces.push({ subs: [outerSub, innerSub], kind: "shadow", strength });

  // 2x2 ignition cut-out drawn as a dark opening in the pan floor
  const ignSquares = (positions, zFloor) => {
    positions.forEach(([qx, qy]) => {
      face3(LP, [[qx - 1, qy - 1, zFloor], [qx + 1, qy - 1, zFloor], [qx + 1, qy + 1, zFloor], [qx - 1, qy + 1, zFloor]], { fill: "#565d63" });
      rect3(LP, qx - 1, qy - 1, qx + 1, qy + 1, zFloor, { thin: true });
      // (2) 1/4"Ø holes, 3/16" above and below the cut
      [-1, 1].forEach((sgn) => {
        const hy = qy + sgn * (1 + 0.1875);
        LP.faces.push({ subs: [circPts2(qx, hy, zFloor, 0.125)], fill: "#565d63" });
        LP.shapes.push({ pts: circPts2(qx, hy, zFloor, 0.125), thin: true });
      });
    });
  };
  // radial midpoint between rings 1 and 2 of a ring burner (or half-radius for a single ring)
  const ringMid = (b) => {
    const R = b.bDia / 2;
    const t = Math.min(b.tube, R / Math.max(b.rings, 1));
    const cOut = R - t / 2;
    return b.rings >= 2 ? (1.5 * cOut) / b.rings : 0.5 * cOut;
  };
  const adjustIgnH = (positions, b, startX) => {
    const t = b.tube;
    const bars = inletFractions(b.inlets).map((f) => startX + f * b.bL);
    return positions.map(([x, y]) => [clearIgnX(x, bars, 1 + t / 2 + 0.15), y]);
  };
  const ignPositionsLinear = (p2, count, xAt, yc, dy = 0) =>
    igniterIdxs(p2, count).map((ii) => [xAt(inletFractions(count)[ii]) + 2, yc + dy]);

  // small flat-bar mounting leg under a rail (real burners sit raised in the pan)
  const legPlate = (lx, ly, zFloor, zTop) => {
    face3(LB, [[lx - 0.5, ly, zFloor], [lx + 0.5, ly, zFloor], [lx + 0.5, ly, zTop], [lx - 0.5, ly, zTop]]);
    poly(LB, [[lx - 0.5, ly, zFloor], [lx + 0.5, ly, zFloor], [lx + 0.5, ly, zTop], [lx - 0.5, ly, zTop], [lx - 0.5, ly, zFloor]], { thin: true });
  };

  const burnerIso = (b, bcx, bcy, zFloor, bInletD, bInlets, inPan) => {
    const legH = inPan ? 0.75 : 0;
    if (b.type === "tburner") {
      const r = b.tube / 2;
      const zc = zFloor + legH + r;
      const x1 = bcx - b.bL / 2, x2 = bcx + b.bL / 2;
      inletFractions(bInlets).forEach((f) =>
        tubeZ(LU, zFloor, zFloor - 1.5, x1 + f * b.bL, bcy, bInletD / 2, { thin: true }));
      if (inPan) {

      circPts2(r * 2 + SHX, p.W - r + SHY, -1.5, r * 1.8), circPts2(p.L - r * 2 + SHX, p.W - r + SHY, -1.5, r * 1.8),
    ], 0.15);
    burnerIso({ type: "hburner", bL: p.L, bW: p.W, tube: p.tube, rows: p.rows }, p.L / 2, p.W / 2, 0, p.inletD, p.inlets);
  } else if (product === "round") {
    const R = p.dia / 2;
    const t = Math.min(p.tube, R / Math.max(p.rings, 1));
    shCircle(R, R, -1.5, R, 0.15, 0.2);
    burnerIso({ type: "round", bDia: p.dia, tube: t, rings: p.rings }, R, R, 0, p.inletD, 1);
  }

  return layers;
}

// metallic gradient stops (across a tube: lit edge -> hot highlight -> falloff)
const TUBE_STOPS = [
  ["0", "#e9eced"], ["0.14", "#fcfdfe"], ["0.34", "#ced3d7"],
  ["0.6", "#aab0b6"], ["0.85", "#959ca2"], ["1", "#8b9298"],
];

function IsoSheet({ product, params, job, drawnBy, dwgNo, estNo, svgRef, title, sheetNo = 2, sheetTotal = 2 }) {
  const margin = 26;
  const tbH = 96;
  const area = { x: margin + 40, y: margin + 60, w: SHEET_W - margin * 2 - 100, h: SHEET_H - margin * 2 - tbH - 110 };

  const layers = useMemo(() => buildIsoModel(product, params), [product, params]);

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const eat = ([x, y]) => {
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  };
  layers.forEach((L) => {
    L.faces.forEach((fc) => fc.subs.forEach((sub) => sub.forEach(eat)));
    L.shapes.forEach((s) => s.pts.forEach(eat));
    L.dots.forEach(eat);
  });
  if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 1; maxY = 1; }
  const s = Math.min(area.w / (maxX - minX || 1), area.h / (maxY - minY || 1)) * 0.94;
  const tx = area.x + (area.w - (maxX - minX) * s) / 2 - minX * s;
  const ty = area.y + (area.h - (maxY - minY) * s) / 2 - minY * s;
  const M = ([x, y]) => [x * s + tx, y * s + ty];
  const faceD = (fc) => fc.subs.map((sub) =>
    "M " + sub.map((q) => M(q).map((v) => v.toFixed(2)).join(" ")).join(" L ") + " Z").join(" ");

  const ISO_LINE = "#4a5055";
  const today = new Date().toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" });

  // gradient defs generated per tube/ring face in screen space
  const gradDefs = [];
  const renderFace = (fc, key) => {
    if (fc.kind === "shadow") {
      return <path key={key} d={faceD(fc)} fill="#2a3035" fillRule="evenodd" opacity={fc.strength * 0.75} filter="url(#softShadow)" stroke="none" />;
    }
    if (fc.kind === "glass") {
      return <path key={key} d={faceD(fc)} fill="#d9eaef" fillRule="evenodd" opacity="0.5" stroke="none" />;
    }
    if (fc.kind === "tube") {
      const id = `tg-${key.replace(/[^a-z0-9]/gi, "")}`;
      const [x1, y1] = M(fc.g1), [x2, y2] = M(fc.g2);
      gradDefs.push(
        <linearGradient key={id} id={id} gradientUnits="userSpaceOnUse" x1={x1} y1={y1} x2={x2} y2={y2}>
          {TUBE_STOPS.map(([o, c]) => <stop key={o} offset={o} stopColor={c} />)}
        </linearGradient>
      );
      return <path key={key} d={faceD(fc)} fill={`url(#${id})`} stroke="none" />;
    }
    if (fc.kind === "ring") {
      const id = `rg-${key.replace(/[^a-z0-9]/gi, "")}`;
      const [cx, cy] = M(fc.center);
      const R = fc.rOut * s;
      const kY = fc.kY || 0.5774; // measured projected ellipse aspect
      gradDefs.push(
        <radialGradient key={id} id={id} gradientUnits="userSpaceOnUse" cx={cx} cy={cy} r={R}
          gradientTransform={`translate(0 ${cy * (1 - kY)}) scale(1 ${kY})`}>
          <stop offset={Math.max(0, fc.fIn - 0.02)} stopColor="#798087" />
          <stop offset={fc.fIn} stopColor="#8b9298" />
          <stop offset={(fc.fIn + fc.fMid) / 2} stopColor="#c9ced2" />
          <stop offset={fc.fMid} stopColor="#f4f6f8" />
          <stop offset={(fc.fMid + 1) / 2} stopColor="#aeb4ba" />
          <stop offset="1" stopColor="#767d84" />
        </radialGradient>
      );
      return <path key={key} d={faceD(fc)} fill={`url(#${id})`} fillRule="evenodd" stroke="none" />;
    }
    return <path key={key} d={faceD(fc)} fill={fc.fill} fillRule="evenodd" stroke="none" />;
  };

  const layerEls = layers.map((L, li) => (
    <g key={li}>
      {L.faces.map((fc, i) => renderFace(fc, `${li}-${i}`))}
      {L.shapes.map((sh, i) => (
        <polyline key={`s${i}`}
          points={sh.pts.map((q) => M(q).join(",")).join(" ")}
          fill="none" stroke={ISO_LINE}
          strokeWidth={sh.thin ? 0.7 : 1.05}
          strokeDasharray={sh.dash ? "8 5" : undefined}
          strokeLinejoin="round" strokeLinecap="round" opacity="0.8" />
      ))}
      {L.dots.map((q, i) => {
        const [x, y] = M(q);
        return <circle key={`d${i}`} cx={x} cy={y} r={1.4} fill={ISO_LINE} />;
      })}
    </g>
  ));

  return (
    <svg ref={svgRef} viewBox={`0 0 ${SHEET_W} ${SHEET_H}`} xmlns="http://www.w3.org/2000/svg"
      style={{ width: "100%", height: "auto", display: "block", background: "#fff" }}>
      <Defs />
      <defs>{gradDefs}</defs>
      <rect x="0" y="0" width={SHEET_W} height={SHEET_H} fill="#ffffff" />
      <rect x={margin} y={margin} width={SHEET_W - margin * 2} height={SHEET_H - margin * 2} fill="none" stroke={LINE} strokeWidth="2.2" />
      <rect x={margin + 6} y={margin + 6} width={SHEET_W - margin * 2 - 12} height={SHEET_H - margin * 2 - 12} fill="none" stroke={LINE} strokeWidth="0.8" />

      <DimText x={margin + 40} y={margin + 40} anchor="start" size={12.5}>ISOMETRIC VIEW</DimText>

      {layerEls}

      <DimText x={margin + 18} y={SHEET_H - margin - tbH - 12} anchor="start" size={10.5}>
        ISOMETRIC REFERENCE VIEW — NOT TO SCALE. SEE SHEET 1 FOR DIMENSIONS AND CALLOUTS.
      </DimText>

      <g fontFamily={FONT}>
        <LogoCell />
        <rect x={SHEET_W - margin - 430} y={SHEET_H - margin - tbH} width={430} height={tbH} fill="#fff" stroke={LINE} strokeWidth="1.6" />
        <line x1={SHEET_W - margin - 430} y1={SHEET_H - margin - tbH + 34} x2={SHEET_W - margin} y2={SHEET_H - margin - tbH + 34} stroke={LINE} strokeWidth="1" />
        <line x1={SHEET_W - margin - 430} y1={SHEET_H - margin - tbH + 64} x2={SHEET_W - margin} y2={SHEET_H - margin - tbH + 64} stroke={LINE} strokeWidth="1" />
        <line x1={SHEET_W - margin - 220} y1={SHEET_H - margin - tbH + 34} x2={SHEET_W - margin - 220} y2={SHEET_H - margin} stroke={LINE} strokeWidth="1" />
        <FitText x={SHEET_W - margin - 420} y={SHEET_H - margin - tbH + 22} maxW={410} size={13} weight="700">{`${title} — ISOMETRIC`}</FitText>
        <FitText x={SHEET_W - margin - 420} y={SHEET_H - margin - tbH + 48} maxW={195} size={10.5}>{`JOB: ${job || "—"}`}</FitText>
        <FitText x={SHEET_W - margin - 420} y={SHEET_H - margin - tbH + 84} maxW={195} size={10.5}>{`DRAWN: ${drawnBy || "—"} · DATE: ${today}`}</FitText>
        <FitText x={SHEET_W - margin - 210} y={SHEET_H - margin - tbH + 48} maxW={195} size={10.5}>{`DWG NO: ${dwgNo || "—"} · SHT ${sheetNo} OF ${sheetTotal}`}</FitText>
        <FitText x={SHEET_W - margin - 210} y={SHEET_H - margin - tbH + 84} maxW={195} size={10.5}>{`SCALE: NTS · EST: ${estNo || "—"}`}</FitText>
      </g>
      <Disclaimer />
    </svg>
  );
}

/* ---------- callout legend ---------- */
// Builds the ordered callout list (A, B, C…) for the legend table, and a map of
// semantic id -> key letter that the drawings use to place their balloons.
function getCallouts(product, p) {
  const list = [];
  const add = (id, text) => { const key = String.fromCharCode(65 + list.length); list.push({ id, key, text }); return key; };
  const b = p.burner;
  const s = (n) => (n > 1 ? "S" : "");

  const addBurnerCallouts = () => {
    if (b.type === "tburner") {
      add("burner", `"T" BURNER — ${fmtIn(b.bL)} O.A., CENTERED IN PAN — (${b.inlets}) ${b.inletLabel} NPT INLET${s(b.inlets)}`);
      add("binlet", `(${p.holes}) Ø ${fmtIn(p.holeD)} HOLE${s(p.holes)} THRU PAN BOTTOM (NO PAN INLET) FOR BURNER INLET${s(p.holes)}${p.holes > 1 ? ", EQ. SPACED" : ""}`);
    } else if (b.type === "hburner") {
      add("burner", `"H" BURNER — ${fmtIn(b.bL)} × ${fmtIn(b.bW)} O.A., CENTERED IN PAN, (${Math.max(2, b.rows || 2)}) TUBE ROWS EQ. SPACED${b.inlets > 1 ? `, (${b.inlets}) CROSSBARS EQ. SPACED` : ", (1) CROSSBAR CENTERED"} — (${b.inlets}) ${b.inletLabel} NPT INLET${s(b.inlets)}`);
      add("binlet", `(${p.holes}) Ø ${fmtIn(p.holeD)} HOLE${s(p.holes)} THRU PAN BOTTOM (NO PAN INLET) FOR BURNER INLET${s(p.holes)}${p.holes > 1 ? ", EQ. SPACED" : ""}`);
    } else if (b.type === "round") {
      add("burner", `RING BURNER — Ø ${fmtIn(b.bDia)}, (${b.rings}) RING TUBES EQ. SPACED, CENTERED IN PAN`);
      add("binlet", `(1) ${fmtIn(p.upD)}Ø × ${fmtIn(p.upL)} LG. MALE NPT GAS INLET, FACING UP, CTR'D IN PAN`);
    }
  };

  const addGlassFill = () => {
    const gd = p.glassFill;
    if (isNaN(gd) || gd <= 0) return;
    const isRound = product === "roundflat" || product === "rounddropin";
    const area = isRound ? Math.PI * Math.pow(p.dia / 2, 2) : p.L * p.W;
    if (isNaN(area) || area <= 0) return;
    const raw = area * gd * 0.052;
    add("fill", `MEDIA FILL @ ${fmtIn(gd)} DEPTH:\nFIRE GLASS: APPROX. ${Math.ceil(raw)} LBS\nTUMBLED LAVA ROCK: APPROX. ${Math.ceil(raw * 0.8)} LBS\nLAVA ROCK: APPROX. ${Math.ceil(raw * 0.5)} LBS`);
  };
  const addIgniter = (count, place) => {
    if (!p.igniter) return;
    const n = p.igniterAll ? count : 1;
    const loc = place || (`CTR'D @ ${n > 1 ? "INLETS" : "CENTER INLET"}`);
    add("igniter", `(${n}) 2" × 2" IGNITION SYSTEM CUT-OUT${n > 1 ? "S" : ""}, THRU PAN BOTTOM, ${loc} — EA. W/ (2) 1/4"Ø MOUNTING PLATE HOLES, CTR'D 3/16" ABOVE & BELOW CUT`);
  };

  if (product === "dropin") {
    add("weep", `(12) 3/16"Ø WEEP HOLES — (3) PER CORNER, TYP.`);
    add("flange", `${fmtIn(p.flange)} FLANGE, TYP. ALL SIDES`);
    if (b) addBurnerCallouts();
    else add("inlet", p.isSquare
      ? `(${p.inlets}) ${p.inletLabel} NPT GAS INLET${s(p.inlets)}, THRU PAN BOTTOM${p.inlets > 1 ? ", EQ. SPACED" : ""}`
      : `(${p.inlets}) Ø ${p.inletLabel} HOLE${s(p.inlets)} THRU PAN BOTTOM (NO PAN INLET)${p.inlets > 1 ? ", EQ. SPACED" : ""}`);
    addIgniter(b ? (b.type === "round" ? 1 : p.holes) : p.inlets, b && b.type === "round" ? "BETWEEN 1ST & 2ND BURNER RINGS @ 45° (CLEAR OF SPOKES)" : null);
    addGlassFill();
  } else if (product === "flat") {
    if (b) addBurnerCallouts();
    else add("inlet", p.isSquare
      ? `(${p.inlets}) ${p.inletLabel} NPT GAS INLET${s(p.inlets)}${p.inlets > 1 ? ", EQ. SPACED ON CENTERLINE" : ""}`
      : `(${p.inlets}) Ø ${p.inletLabel} HOLE${s(p.inlets)} THRU PAN BOTTOM (NO PAN INLET)${p.inlets > 1 ? ", EQ. SPACED ON CENTERLINE" : ""}`);
    addIgniter(b ? (b.type === "round" ? 1 : p.holes) : p.inlets, b && b.type === "round" ? "BETWEEN 1ST & 2ND BURNER RINGS @ 45° (CLEAR OF SPOKES)" : null);
    addGlassFill();
  } else if (product === "rounddropin") {
    add("weep", `(12) 3/16"Ø WEEP HOLES — (3) PER QUADRANT, TYP.`);
    add("flange", `${fmtIn(p.flange)} FLANGE, TYP. ALL AROUND`);
    if (b) addBurnerCallouts();
    else add("inlet", p.inlets > 1
      ? `(${p.inlets}) ${p.inletLabel} NPT GAS INLETS, EQ. SPACED ON CENTERLINE @ ${fmtIn((p.dia * 0.7) / p.inlets)} O.C.`
      : `(1) ${p.inletLabel} NPT GAS INLET, CENTERED`);
    addIgniter(b ? (b.type === "round" ? 1 : p.holes) : p.inlets, b && b.type === "round" ? "BETWEEN 1ST & 2ND BURNER RINGS @ 45° (CLEAR OF SPOKES)" : null);
    addGlassFill();
  } else if (product === "roundflat") {
    if (b) addBurnerCallouts();
    else add("inlet", p.inlets > 1
      ? `(${p.inlets}) ${p.inletLabel} NPT GAS INLETS, EQ. SPACED ON CENTERLINE @ ${fmtIn((p.dia * 0.7) / p.inlets)} O.C.`
      : `(1) ${p.inletLabel} NPT GAS INLET, CENTERED`);
    addIgniter(b ? (b.type === "round" ? 1 : p.holes) : p.inlets, b && b.type === "round" ? "BETWEEN 1ST & 2ND BURNER RINGS @ 45° (CLEAR OF SPOKES)" : null);
    addGlassFill();
  } else if (product === "guard" || product === "guardround") {
    add("glass", `${fmtIn(p.t)} THK. TEMPERED GLASS PANEL${product === "guardround" ? " (CYL.)" : "S"}, ${fmtIn(p.H)} HIGH`);
    if (product === "guard") {
      const clips = p.H > 10 ? 3 : 2;
      const nL = Math.max(1, Math.ceil(p.L / 44)), nW = Math.max(1, Math.ceil(p.W / 44));
      add("corner", `CORNER BRACKETS — (${clips}) CLIPS EA. CORNER (${clips === 3 ? "TOP, MID & BOT" : "TOP & BOT"}), W/ FEET`);
      add("feet", `LEVELING FEET AT EA. CORNER & PANEL JOINT`);
      add("tabs", `RETAINING CLIPS @ PANEL BOTTOM EDGES, TYP.`);
      if (nL > 1 || nW > 1) {
        const parts = [];
        if (nL > 1) parts.push(`${fmtIn(p.L)} SIDES: (${nL}) PCS @ ${fmtIn(p.L / nL)}`);
        if (nW > 1) parts.push(`${fmtIn(p.W)} SIDES: (${nW}) PCS @ ${fmtIn(p.W / nW)}`);
        add("splice", `PANELS OVER 44" SPLIT INTO FEWEST EQ.-LENGTH PIECES — ${parts.join("; ")} — JOINED W/ VERTICAL H-BRACKETS, (${clips}) CLIPS EA.`);
      }
    }
    if (!p.standalone) add("fit", product === "guardround" ? `STD SIZING = PAN Ø + 4"` : `STD SIZING = PAN O.A. + 4" EA. DIRECTION`);
  } else if (product === "lid" || product === "lidround") {
    add("handle", `(${p.handles}) LID HANDLE${s(p.handles)}, CTR'D ON WIDTH C.L.${p.handles > 1 ? ", EQ. SPACED — (1) PER 38\" OF LENGTH" : ""}`);
    add("skirt", `1 1/2" SKIRT (LID HEIGHT), ALL SIDES`);
    if (!p.standalone) add("fit", product === "lidround"
      ? `LID OVERSIZED 1" PER SIDE — FITS Ø ${fmtIn(p.panDia)} PAN O.A.`
      : `LID OVERSIZED 1" PER SIDE — FITS ${fmtIn(p.panL)} × ${fmtIn(p.panW)} PAN O.A.`);
  } else if (product === "tburner") {
    add("inlet", `(${p.inlets}) ${p.inletLabel} NPT INLET${s(p.inlets)}, DOWN${p.inlets > 1 ? ", EQ. SPACED" : ", CENTERED"}`);
  } else if (product === "hburner") {
    add("burner", `(${Math.max(2, p.rows || 2)}) BURNER TUBE ROWS, EQ. SPACED ACROSS ${fmtIn(p.W)} O.A.`);
    add("inlet", `(${p.inlets}) ${p.inletLabel} NPT INLET${s(p.inlets)} @ CROSSBAR MID-SPAN, DOWN${p.inlets > 1 ? ` — (${p.inlets}) CROSSBARS EQ. SPACED` : " — (1) CROSSBAR CENTERED"}`);
  } else if (product === "round") {
    const R = p.dia / 2;
    const t = Math.min(p.tube, R / Math.max(p.rings, 1));
    add("rings", `(${p.rings}) RING TUBES, EQ. SPACED @ ${fmtIn((R - t / 2) / p.rings)} (CENTERLINE)`);
    add("inlet", `(1) ${p.inletLabel} FEMALE NPT CENTER HUB, FACING DOWN — FLUSH, NO STUB`);
  }
  return list;
}

// simple word-wrap for legend rows
function wrapText(s, max = 40) {
  const lines = [];
  s.split("\n").forEach((seg) => {
    const words = seg.split(" ");
    let cur = "";
    words.forEach((w) => {
      if ((cur + " " + w).trim().length > max) { if (cur) lines.push(cur); cur = w; }
      else cur = (cur + " " + w).trim();
    });
    if (cur) lines.push(cur);
  });
  return lines;
}

function sheetTitle(product, params) {
  const burnerSuffix = params.burner ? {
    tburner: ` W/ ${fmtIn(params.burner.bL)} "T" BURNER`,
    hburner: ` W/ ${fmtIn(params.burner.bL)} × ${fmtIn(params.burner.bW)} "H" BURNER`,
    round: ` W/ Ø ${fmtIn(params.burner.bDia)} RING BURNER`,
  }[params.burner.type] : "";
  return {
    dropin: `${params.isSquare ? "SQUARE " : ""}DROP-IN PAN — ${fmtIn(params.L)} × ${fmtIn(params.W)} I.D. × ${fmtIn(params.D)} DP, ${fmtIn(params.flange)} FLANGE${burnerSuffix}`,
    flat: `${params.isSquare ? "SQUARE " : ""}FLAT PAN — ${fmtIn(params.L)} × ${fmtIn(params.W)} O.A.${burnerSuffix}`,
    rounddropin: `ROUND DROP-IN PAN — Ø ${fmtIn(params.dia)} I.D. × ${fmtIn(params.D)} DP, ${fmtIn(params.flange)} FLANGE${burnerSuffix}`,
    roundflat: `ROUND FLAT PAN — Ø ${fmtIn(params.dia)} O.A.${burnerSuffix}`,
    tburner: `LINEAR "T" BURNER — ${fmtIn(params.L)} O.A.`,
    hburner: `"H" BURNER — ${fmtIn(params.L)} × ${fmtIn(params.W)} O.A.`,
    round: `RING BURNER — Ø ${fmtIn(params.dia)}, (${params.rings}) RINGS`,
    lid: `PAN LID — ${fmtIn(params.L)} × ${fmtIn(params.W)} O.A. × ${fmtIn(1.5)} H`,
    guard: `FLAME GUARD — ${fmtIn(params.L)} × ${fmtIn(params.W)} × ${fmtIn(params.H)} H, ${fmtIn(params.t)} GLASS`,
    guardround: `ROUND FLAME GUARD — Ø ${fmtIn(params.dia)} × ${fmtIn(params.H)} H, ${fmtIn(params.t)} GLASS`,
    lidround: `ROUND PAN LID — Ø ${fmtIn(params.dia)} O.A. × ${fmtIn(1.5)} H`,
  }[product];
}

function Sheet({ product, params, job, drawnBy, dwgNo, estNo, svgRef, sheetNo = 1, sheetTotal = 2 }) {
  const margin = 26;
  const tbH = 96; // title block height
  const LEGEND_W = 300;
  const area = { x: margin + 80, y: margin + 56, w: SHEET_W - margin * 2 - 200 - LEGEND_W, h: SHEET_H - margin * 2 - tbH - 120 };

  const callouts = getCallouts(product, params);
  const co = Object.fromEntries(callouts.map((c) => [c.id, c.key]));
  const P = { ...params, co };
  const legendX = SHEET_W - margin - LEGEND_W - 8;
  const legendY = margin + 44;

  // --- HARD BOUNDS GUARANTEE ---
  // After render, measure the actual bounding box of everything in the drawing
  // (geometry, dimension text, balloons, arrows) and, if anything falls outside
  // the safe zone, scale + recenter the whole drawing so it fits. Nothing can
  // ever render off the sheet.
  const contentRef = useRef(null);
  const [fit, setFit] = useState({ s: 1, tx: 0, ty: 0 });
  const notesReserve = 130; // space above title block kept clear for notes (max note stack)
  const safe = {
    x: margin + 14,
    y: margin + 26,
    w: legendX - (margin + 14) - 14,
    h: (SHEET_H - margin - tbH - notesReserve) - (margin + 26),
  };
  useLayoutEffect(() => {
    const el = contentRef.current;
    if (!el || typeof el.getBBox !== "function") return;
    try {
      const b = el.getBBox();
      if (!b || !isFinite(b.width) || b.width <= 0 || b.height <= 0) return;
      const pad = 6; // breathing room for arrowheads/stroke width
      const s = Math.min(1, (safe.w - pad * 2) / b.width, (safe.h - pad * 2) / b.height);
      const tx = safe.x + (safe.w - b.width * s) / 2 - b.x * s;
      const ty = safe.y + (safe.h - b.height * s) / 2 - b.y * s;
      setFit((f) =>
        Math.abs(f.s - s) > 0.002 || Math.abs(f.tx - tx) > 0.5 || Math.abs(f.ty - ty) > 0.5
          ? { s, tx, ty } : f);
    } catch (e) { /* measurement unavailable; keep unscaled */ }
  }, [product, params]);

  const isPanProper = product === "dropin" || product === "rounddropin" || product === "flat" || product === "roundflat";
  const isPanSheet = isPanProper || product === "lid" || product === "lidround";
  const noteItems = [];
  if (isPanProper) noteItems.push("WEEP HOLES AND IGNITION CUT-OUTS WILL BE ADDED AS NEEDED AND MAY NOT BE REFLECTED IN THE RENDERING.");
  if (product === "dropin" || product === "rounddropin") noteItems.push("DROP-IN PAN DIMENSIONS ARE INTERNAL; OVERALL = INTERNAL + (2×) FLANGE.");
  noteItems.push("ALL DIMENSIONS IN INCHES. DO NOT SCALE DRAWING.");
  const isGuardSheet = product === "guard" || product === "guardround";
  noteItems.push(isPanSheet
    ? `MATERIAL: ${params.gauge ? `${params.gauge} GA. ` : ""}304 STAINLESS STEEL U.N.O.`
    : isGuardSheet
      ? `MATERIAL: ${fmtIn(params.t)} THK. TEMPERED GLASS.`
      : "MATERIAL: SS U.N.O.");
  noteItems.push("FOR MANUFACTURING / INSTALLATION REFERENCE ONLY.");
  if (isPanProper && params.split)
    noteItems.push("PAN SPLIT AT CENTERLINE — FABRICATED AND SHIPPED IN (2) SECTIONS.");
  if (params.burner)
    noteItems.push("BURNER SHOWN INSTALLED, CENTERED IN PAN; BURNER INLET(S) PASS THRU PAN BOTTOM.");
  const notes = noteItems.map((t, i) => `${i + 1}. ${t}`);

  const title = sheetTitle(product, params);

  const today = new Date().toLocaleDateString("en-US", { month: "2-digit", day: "2-digit", year: "numeric" });

  return (
    <svg ref={svgRef} viewBox={`0 0 ${SHEET_W} ${SHEET_H}`} xmlns="http://www.w3.org/2000/svg"
      style={{ width: "100%", height: "auto", display: "block", background: "#fff" }}>
      <Defs />
      <rect x="0" y="0" width={SHEET_W} height={SHEET_H} fill="#ffffff" />
      <rect x={margin} y={margin} width={SHEET_W - margin * 2} height={SHEET_H - margin * 2} fill="none" stroke={LINE} strokeWidth="2.2" />
      <rect x={margin + 6} y={margin + 6} width={SHEET_W - margin * 2 - 12} height={SHEET_H - margin * 2 - 12} fill="none" stroke={LINE} strokeWidth="0.8" />

      {/* drawing content — auto-fitted so nothing can leave the sheet */}
      <g ref={contentRef} transform={`translate(${fit.tx} ${fit.ty}) scale(${fit.s})`}>
        {product === "dropin" && <DropInPanDrawing p={P} area={area} />}
        {product === "flat" && <FlatPanDrawing p={P} area={area} />}
        {product === "roundflat" && <RoundFlatPanDrawing p={P} area={area} />}
        {product === "rounddropin" && <RoundDropInPanDrawing p={P} area={area} />}
        {product === "tburner" && <TBurnerDrawing p={P} area={area} />}
        {product === "hburner" && <HBurnerDrawing p={P} area={area} />}
        {product === "round" && <RoundBurnerDrawing p={P} area={area} />}
        {product === "lid" && <LidDrawing p={P} area={area} />}
        {product === "lidround" && <RoundLidDrawing p={P} area={area} />}
        {product === "guard" && <GuardDrawing p={P} area={area} />}
        {product === "guardround" && <RoundGuardDrawing p={P} area={area} />}
      </g>

      {/* callout legend */}
      <g>
        <rect x={legendX} y={legendY} width={LEGEND_W} height={30 + callouts.reduce((h, c) => h + wrapText(c.text).length * 13 + 12, 0)}
          fill="#ffffff" stroke={LINE} strokeWidth="1.4" />
        <text x={legendX + 12} y={legendY + 20} fontFamily={FONT} fontSize="11.5" fontWeight="700" fill={LINE}>CALLOUTS</text>
        <line x1={legendX} y1={legendY + 28} x2={legendX + LEGEND_W} y2={legendY + 28} stroke={LINE} strokeWidth="1" />
        {(() => {
          let y = legendY + 46;
          return callouts.map((c) => {
            const lines = wrapText(c.text);
            const rowY = y;
            y += lines.length * 13 + 12;
            return (
              <g key={c.key}>
                <circle cx={legendX + 20} cy={rowY - 4} r={9} fill="#ffffff" stroke={LINE} strokeWidth="1.3" />
                <text x={legendX + 20} y={rowY - 0.5} textAnchor="middle" fontFamily={FONT} fontSize="10.5" fontWeight="700" fill={LINE}>{c.key}</text>
                {lines.map((ln, i) => (
                  <text key={i} x={legendX + 36} y={rowY + i * 13} fontFamily={FONT} fontSize="9.5" fill={LINE}>{ln}</text>
                ))}
              </g>
            );
          });
        })()}
      </g>

      {/* notes */}
      <g>
        <DimText x={margin + 18} y={SHEET_H - margin - tbH - 12 - (notes.length - 1) * 15} anchor="start" size={11.5}>NOTES:</DimText>
        {notes.map((n, i) => (
          <DimText key={i} x={margin + 18} y={SHEET_H - margin - tbH + 3 - (notes.length - 1 - i) * 15} anchor="start" size={10.5}>{n}</DimText>
        ))}
      </g>

      {/* title block */}
      <g fontFamily={FONT}>
        <LogoCell />
        <rect x={SHEET_W - margin - 430} y={SHEET_H - margin - tbH} width={430} height={tbH} fill="#fff" stroke={LINE} strokeWidth="1.6" />
        <line x1={SHEET_W - margin - 430} y1={SHEET_H - margin - tbH + 34} x2={SHEET_W - margin} y2={SHEET_H - margin - tbH + 34} stroke={LINE} strokeWidth="1" />
        <line x1={SHEET_W - margin - 430} y1={SHEET_H - margin - tbH + 64} x2={SHEET_W - margin} y2={SHEET_H - margin - tbH + 64} stroke={LINE} strokeWidth="1" />
        <line x1={SHEET_W - margin - 220} y1={SHEET_H - margin - tbH + 34} x2={SHEET_W - margin - 220} y2={SHEET_H - margin} stroke={LINE} strokeWidth="1" />
        <FitText x={SHEET_W - margin - 420} y={SHEET_H - margin - tbH + 22} maxW={410} size={13} weight="700">{title}</FitText>
        <FitText x={SHEET_W - margin - 420} y={SHEET_H - margin - tbH + 48} maxW={195} size={10.5}>{`JOB: ${job || "—"}`}</FitText>
        <FitText x={SHEET_W - margin - 420} y={SHEET_H - margin - tbH + 84} maxW={195} size={10.5}>{`DRAWN: ${drawnBy || "—"} · DATE: ${today}`}</FitText>
        <FitText x={SHEET_W - margin - 210} y={SHEET_H - margin - tbH + 48} maxW={195} size={10.5}>{`DWG NO: ${dwgNo || "—"} · SHT ${sheetNo} OF ${sheetTotal}`}</FitText>
        <FitText x={SHEET_W - margin - 210} y={SHEET_H - margin - tbH + 84} maxW={195} size={10.5}>{`SCALE: NTS · EST: ${estNo || "—"}`}</FitText>
      </g>
      <Disclaimer />
    </svg>
  );
}

// condensed legal footer on every sheet — stacked in the strip LEFT of the
// title block so it never runs underneath it (title block starts at x = 724)
const Disclaimer = () => {
  const m = 26;
  const maxW = SHEET_W - m - 430 - 152 - (m + 14) - 12; // stop short of the logo + title block
  const y0 = SHEET_H - m - 30;
  const L = (txt) => (txt.length * 4.55 > maxW ? { textLength: maxW, lengthAdjust: "spacingAndGlyphs" } : {});
  const l1 = "DIMENSIONS, MEASUREMENTS & ILLUSTRATIONS ARE APPROXIMATE, FOR VISUAL REFERENCE ONLY — NO GUARANTEE OF COMPLETENESS OR ACCURACY.";
  const l2 = "VERIFY ALL DIMENSIONS & SPECIFICATIONS PRIOR TO FABRICATION, INSTALLATION, OR CONSTRUCTION.";
  const l3 = "PROPRIETARY & CONFIDENTIAL PROPERTY OF AMERICAN FIRE PRODUCTS — DO NOT COPY, REPRODUCE, DISTRIBUTE, OR DISCLOSE WITHOUT PRIOR WRITTEN CONSENT.";
  return (
    <g fontFamily={FONT} fontSize="7.4" fill={LINE} opacity="0.85">
      <text x={m + 14} y={y0} {...L(l1)}>{l1}</text>
      <text x={m + 14} y={y0 + 9} {...L(l2)}>{l2}</text>
      <text x={m + 14} y={y0 + 18} {...L(l3)}>{l3}</text>
